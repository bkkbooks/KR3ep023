body:
  text: 卷上春溫溫邪有升無降經肺氣機交逆營衛失其常度為寒熱胃津日耗渴飲不飢陽氣獨行則頭痛面赤是皆冬春驟暖天地失藏人身應之患此者最多考古人溫病忌表散誤投即謂邪熱逆傳心包最怕神昏譫語治法以辛甘涼泄肺胃蓋傷寒入足經溫邪入手經也土潤則肺降不致膹郁胃熱下移知飢渴解矣嫩青竹葉白糖炒石膏杏仁甘蔗汁經霜桑葉麥門冬生甘草勞倦嗔怒是七情內傷而溫邪感觸氣從口鼻直走膜原中道蓋傷寒陽證邪是太陽次第傳及至於春溫夏熱鼻受氣則肺受病口入之氣竟由脘中所以原有手經見症不比傷寒足六經病也其原不同治法亦異仲景論溫邪不可發汗汗則劫津傷陽身必灼熱一逆尚引日再逆促命期又云鼻息鼾語言難出劇則驚癇瘛瘲無非重劫陰陽而然今病發熱原不似太陽客邪見證所投羌防辛溫表汗之誤即為逆矣上竅不納下竅不出亦屬常事必以攻下稀水泄熱殊不知強汗劫津而陽傷妄下劫液而傷陰矣頃診脈兩手如搐而戰舌乾燥而無津齒前板干目欲瞑口欲開周身燈照而淡晦斑紅隱隱躍躍幾日來時有厄逆因胃乏穀氣而中空肝陽衝突上冒肆虐耳為今反正先與糜粥使胃中得濡厥陽不致上冒而神昏之纍可已進藥之理甘溫可以生津除熱即斑疹亦不足慮也觀仲景論中邪少虛多陰液陽津並涸者復脈湯主之謹仿此意人參生地炙甘草麥冬阿膠白芍冬月熱伏於裡春令風溫入肺引動舊時伏熱營衛流行邪干怫鬱遂致寒熱四十日來形神瘦削入夜著枕便躁經云不得臥臥則喘煩乃肺氣之逆也幼稚陽常有餘陰常不足故晝輕夜重耳病名風溫手太陰肺屬上焦至高之所若清痰消食若苦寒通便方藥皆徒攻腸胃焉能恰當至理倘氣閉竅塞慢驚亦是久延致危萬難調理久而失治肺津日枯氣失清降又屬肺脹喘促議孫真人葦莖湯宣通氣血以驅伏邪之意心營肺衛為溫邪留伏氣血流行與邪相遇搏激遂有寒熱如瘧之狀今形神羸瘦久延經月速則恐其成驚再延恐致兒勞多進苦藥消克胃口又慮敗倒急清氣熱以通營衛使溫邪無容留之地寒熱可冀其止至於痰嗽必得胃口充旺而肺金自全要非藥餌強劫之謂輕劑桂枝白虎湯稚年陽亢陰虛溫邪深入不解留伏營衛之中晝夜氣行遇邪則熱如瘧同義先議清氣分兼通營衛一法川桂枝知母生甘草生石膏麥冬白風米清氣熱通營衛果得咳熱皆緩前論溫邪犯肺是矣但稚年易實易虛寒暄食物之調最宜謹慎勿致反復為上鮮地骨皮大沙參生甘草嘉定天花粉炒川貝金銀花風溫不解早涼晚熱舌絳口渴熱邪未清陰液衰也胃汁耗則不知飢宜生津和陽以蘇胃淡黃芩烏梅青蒿生白芍橘紅鱉甲溫邪內伏潮熱自利暮甚於晝者稚年陰氣淺也仲景於暮春瘟病內應肝膽例黃芩湯為主黃芩杏仁淡竹葉白芍甘草木通溫邪深入咽阻心中熱悶自利三焦咸病恐熱極欲厥淡黃芩川連杏仁生白芍烏梅淡竹葉風溫入肺肺氣失降鬱蒸熱聚咳痰臥不安靜高年積勞之體最宜甘寒清燥所謂風溫得潤而解桑葉甜杏仁麥冬蔗梨汁沙參玉竹竹葉左大空搏陽不潛伏咳吐涎陳阿膠炒麥冬生白芍雞子黃生地炭炙甘草脈大咽乾痰多咳頻食下腹悶此風溫日久勞倦內熱津傷液燥冬桑葉甜杏仁麥門冬蔗漿大沙參玉竹生甘草梨汁風溫入肺咳嗽脈堅搏夜臥汗出陰分先虧最多失血大忌發散苦辛從溫邪當甘潤而解桑葉甜杏仁炒麥冬白沙參玉竹生甘草元米湯煎風溫不解肺氣不利寒熱汗出吐血更有惱怒肝逆內外兩因之症為左右立法蘆根汁杏仁丹皮黑梔皮生米仁鬱金鉤藤栝蔞仁肺痹脘中及腹痛自利清穀是風溫邪熱相搏諸氣失於宣降擬進開手太陰法以滋氣化得小便利可安蘆根汁桑葉栝蔞皮枯芩杏仁桔梗鬱金汁橘紅風溫入肺肺郁失降氣窒上焦清空之地發散則犯溫邪劫津故口渴氣逆不已腹痛而嘔胃絡受傷耳桑葉杏仁蔓荊子象貝馬勃牛蒡子面浮咽痛溫邪未解輕劑苦辛泄降桑葉大沙參通草連翹大力子滑石溫邪上混頭痛氣喘治在手太陰肺酒客痰熱素盛苦降為宜杏仁花粉連翹枳實汁橘紅黃芩白芍鬱金汁風溫入手太陰氣鬱熱聚喘逆口渴營衛失和周身掣痛脈右搏防失血桑葉杏仁生米仁蘇梗梔皮鬱金風溫不解頓嗽嘔吐宜淡滲以利熱清胃蘆根杏仁滑石米仁桑葉通草風溫陽逆嘔噫枇杷葉白杏仁金石斛桑葉大沙參茯苓外寒內熱溫邪氣逆為嘔嫩蘇梗杏仁黃芩冬桑葉橘紅厚朴溫邪嘔逆淡黃芩竹茹半夏曲川石斛鬱金鉤藤茯苓廣皮白風溫輕恙誤汗表疏形寒自汗先進建中法以和營衛繼當以參苓補劑則表裡平和可安昨進建中法因表氣不固形寒汗泄主乎護陽理營今繼進金匱麥冬湯以蘇津液得胃陰稍振然後商進峻補庶為合宜不致偏勝之弊炒麥冬生甘草甜梨漿北沙參生白芍甘蔗汁久嗽失音歲暮用參耆益氣得效春令風溫燥熏其汗亦如火劫逼陽同例但仲景救逆在太陽少陰此證氣泄肺傷互異從風溫汗出不解葳蕤湯主之咳嗽二年形瘦減谷冬季喉垂漸痛已見水虧陽氣不藏春月氣升日盛皆陰乏上承陽結於上為喉痹矣近日寒熱風溫客氣脈小數為陰傷忌用辛散桑葉玉竹川貝母大沙參麥冬生甘草背寒復熱發於晡時暮夜寐多驚惕食入欲嘔此肝陰久虛陽獨上熾風溫乃是客氣多延漸為本虛矣泡淡黃芩生牡蠣烏梅肉生白芍桂枝木大棗又人參炒阿膠煅牡蠣茯神炒白芍炒烏梅冬月溫邪內伏入春寒熱咳嗽身痛漸汗乃解與溫瘧同法桂枝白虎湯風溫如瘧煩倦乃內熱水虧犀角地黃湯加知母澤瀉風溫上受氣鬱熱生咽痛嗽頻震動痰血以清肅上焦薄味調理桑葉花粉大力子杏仁大沙參射干連翹仁象貝風溫上郁是冷暖侵肺使然輕劑清解忌發散杏仁黑梔皮栝蔞皮象貝桑葉嫩蘇梗鬱金汁氣逆痰升呼吸不爽仍宜清解杏仁象貝白沙參滑石桑葉橘皮鬱金汁紫菀風溫鬱熱上升支飲亦令上泛渴煩咳涎下虛上實仍宜輕劑清理桂枝木茯苓白芍石膏米仁甘草又小青龍湯去麻辛半甘加石膏面赤足冷脈沉弦細吸短有聲昏昏欲寐下焦淋帶不斷此下虛不攝飲濁上泛咳無止期從來飲家咳逆當治其飲仲景謂飲家短氣倚息以外飲屬脾用苓桂術甘理脾陽以運行內飲屬腎進腎氣以收攝固納仿此為法腎氣丸淡鹽湯送下又熟地炭茯苓淡蓯蓉五味子白芍胡桃肉左堅數甚舌喑不言得飲漸嗆漸厄此溫邪內伏少陰水虧液燥熱氣上冒乃中厥之象老年最怕面赤神昏為衰脫耳生地知母炒遠志梨汁天冬川石斛石菖蒲蔗汁久虛勞損幾年不復當春深陽氣發泄溫邪乘虛入陰寒熱汗出不納穀食脘中痞悶不舒胃乏氣運側眠咳痰病熱險篤恐難萬全人參旋覆花木瓜茯苓赭石炒粳米此因驚憂內傷肝藏邪熱乘虛內陷直走厥陰消渴漸嘔汗大泄胸腹脹次第論證端都屬在裡半月以外之病左脈堅搏如刃耳聾昏躁不靜豈是脈證相合議以鎮逆一法冀其神清勿躁不致厥脫生牡蠣生白芍桂枝木生龍骨烏梅肉陽亢陰虛煩躁妄言無寐苟非鎮靜焉得神清議乙癸同治熄內風和陽擾為近理水制熟地茯苓生白芍磁石澤瀉山藥丹皮辰砂多言原從熱治診脈小數又當元氣大泄之餘故壯水制陽王道成法若但說實火純以苦降必致變症蜂起試論食粥後原有片時安靜豈非水穀鎮胃虛陽不致擾動焉得純以實火治以陰陽偏勝為理不致敗壞天冬川黃連生地女貞茯神雞子黃阿膠白芍左三部動數倍右陽擾不和戀定是陰中之火所以粥食鎮胃稍安且善飢欲食即內經陽亢為消之驗治法總在足三陰勿參入亂藥為正質重益陰佐以介類潛藏立法熟地龜甲萸肉白芍茯神鱉甲女貞炙草鼻煤唇裂舌腐頻與芩連熱不肯已此病輕藥重致流行之氣結閉不行郁遏不通其熱愈甚上則不嗜飲納食小便雖利便必管痛三焦皆閉神昏痙厥有諸矣竹葉杏仁川貝母連翹射干鮮石菖蒲汁自停服藥日有向愈之機胃困則痞悶不欲食今雖未加餐已知甘美皆醒之漸也童真無下虛之理溲溺欲出尿管必痛良由肺津胃汁因苦辛燥烈氣味劫奪枯槁無以運行若必以分利為治所謂泉源既竭當滋其化源九竅不和都屬胃病也甜杏仁蔗汁麥冬梨汁初春暴冷暖覆臥床漸漸失音久則咽喉皆痛痰沫上泛納食照常已非虛象致內為熱迫外為寒鬱越婢加半夏湯溫邪形寒痰嗽脈形細小少陰本氣素弱治邪宜以輕藥勿得動下蘇梗桑葉沙參杏仁玉竹橘紅溫邪爍陰寒熱渴飲不汗出玉女煎去麥冬加竹葉燈心時癘濕溫疫邪三焦兼受營衛失度體虛防厥犀角連翹川貝母元參銀花鮮菖蒲舌白灰刺肢痙牽厥神識少慧如寐默默囈語穢邪欲閉宜開久延胃氣已乏闢穢須輕輔以養胃人參半夏鮮菖蒲根汁粳米麥冬口鼻吸入穢濁著於膜府不飢嘔逆中焦病也宜通濁痹為正法忌清涼發散杏仁草果仁檳榔藿香蔻仁製半夏厚朴薑汁鼻煤舌縮耳聾神呆環口裂血津液被劫必漸昏昧邪已入絡所謂內閉外脫犀角尖元參銀花露鮮生地連翹石菖蒲又化服至寶丹穢濁閉塞胸膈神迷昏厥速速開竅牛黃丸熱蘊三焦煩渴不寐遍體赤斑兩脈搏數犀角尖生地連翹金銀花羚羊角元參花粉菖蒲根營虛斑伏不透咽痛嘔惡議金匱升麻鱉甲湯升麻一錢歸身二錢川椒三分鱉甲四錢赤芍一錢熱久陰傷津液不承咳嗆舌紅罩黑不飢不食肌膚甲錯渴飲不休當滋胃汁以供肺惟甘寒為宜麥冬桑葉蔗汁花粉梨汁久郁內傷著於時令之濕熱舌焦黃頭痛汗出腰痛乃內外兩因之病最防昏厥羚羊角黑梔皮黃芩石菖蒲連翹仁鬱金穢濁熱氣蔽塞神昏舌黃厄逆勢甚險篤先用萬氏清心牛黃丸一服時氣兼勞倦悒鬱舌黃氣促身痛當以內傷為重禁風藥杏仁栝蔞皮黑梔桔梗枳實滑石溫邪入里昏昏似寐並不大熱渴飲必夾濕氣故身痛耳聾當宜通其里莫以發散消導大犯濕溫劫津之戒杏仁梔皮香豉連翹鬱金淡芩風溫濕熱狀如瘧症神昏妄言煩渴已非表病木防己湯主之木防己黑梔土蔞皮石膏連翹杏仁脈右大舌黃不渴嘔吐黏痰神躁語言不清身熱不除此勞倦內傷更感溫邪須防變痙厚朴廣皮六一散石菖蒲根汁白蔻仁茯苓淡竹葉此濕溫也濕著關節為痛濕阻氣隧為痞悶濕留腸胃為下利濕蒸則裡熱如火是以畏見日光積勞陽氣大傷腸風營陰耗泄體虛而兼六淫之邪頗為重症大旨以和陽明厥陰為主枯黃芩川楝皮製半夏廣皮白生白芍烏梅肉茯苓川黃柏濕邪骨骱發紅瘰胸聚濁痰消濁未已用木防己湯木防己杏仁生米仁生石膏滑石寒水石通草五錢煎湯代水暑三氣交蒸暑邪無不夾濕濕病俱以入暑門本系勞倦氣虛之體當此暴熱熱從口鼻受竟走中道經云氣虛身熱得之傷暑暑熱蒸迫津液日槁陽升不寐喘促舌乾齒前板燥刻欲昏冒矣甘寒生津益氣一定之理人參白虎湯加捲心竹葉麥門冬煩渴耳聾但熱無寒漸嘔胸腹痞脹此暑熱由口鼻入三焦受濁營衛不通寤不成寐日期半月熱深入陰防其瘛瘲發厥桂枝白虎湯暑風頭脹口渴身熱嘔痰脈弦防瘧香薷花粉貝母杏仁蘇梗橘紅暑風未變成瘧欲嘔脘痹氣喘乃上焦受病正氣久虛無發散消導更通大便之理此乃口鼻受氣與風寒停食不相侔者杏仁花粉黃芩蘇梗白蔻厚朴暑邪在上清空諸竅熱瘡咳痰氣促肺熱急清竹葉杏仁黃芩連翹川貝鬱金潮熱煩渴欲得冷飲暑燥津液故發疹唇瘡不足盡其邪理進清氣熱通營衛桂枝白虎湯加麥冬熱傷肺氣煩渴便祕但暑病忌下尚宜甘寒生津為主竹葉石膏湯去半夏加玉竹氣熱劫津煩渴安寐則減此虛象也況咳嗽百日肺氣大傷此益氣生津諒不可少勿以拘宿垢未下致因循也人參捲心竹葉木瓜麥冬大麥仁暑熱由中而受不可表散藿香梗杏仁黃芩木瓜絲瓜葉蔻仁橘紅暑熱消爍胃汁口渴不飢以制木和胃省頭草生白芍橘紅麥門冬烏梅肉半曲脈右弦中痞暑邪入里三焦俱病況發汗後熱不解其病不在表可知矣進苦勝於辛方法杏仁金石斛黃芩花粉桔梗陳皮白草果陰虛之體遇夏氣泄元氣受傷神倦不耐煩勞復因暑邪竊踞中宮遂致胃不知飢口不知味或噁心或噯氣腹鳴漸痛豈非病在中焦久延三焦俱困恐有瘧痢之虞宜安閒調攝旬日可安進溫膽法竹茹金石斛木瓜鬱金半曲廣皮烏梅暑熱傷氣形均日減汗泄則煩倦氣浮越面腫夏月正在氣泄當治後天仿東垣清暑益氣法人參五味神麯黃柏煨葛根麥冬川連麥芽澤瀉久虛之體客氣易於乘襲近因濕熱穢氣所觸中宮不和升降失節宜先進六和湯長夏脾胃主乎氣候暑濕氣自口入由膜原以入中宮脾胃受困正氣已餒勉進食物不肯轉運氣機呆鈍清濁失職郁遏於中少火皆為壯火欲噯不得心中熱思冷飲坐起頭旋欲暈形骸疲倦無力皆壯火食氣內風掀旋之象藥餌效與不效在醫而平居調護功夫須自琢磨冀免小愈病加之纍屢經反復再無復原之日古人因病損真生氣不來最深慮及此人參醋炒半夏生白芍鬱金汁川連烏梅肉枳實汁頭脹脘悶漸痛渴喜飲水下咽則嘔煩熱無寐大便漸溏不爽此暑熱氣從口鼻而入竟走三焦清濁為阻營衛不行是以發散消導膏無取效徒令克爍胃汁所以嘔煩不已也法宜苦降和陽方杏仁黃芩竹茹花粉枳實汁橘紅蔻仁半曲鬱金暑熱多日深入血中所以衄血熱泄身涼頃診脈弦左搏連日嘔逆胃氣受戕而發散消食都是劫耗胃汁之物幾日傷觸焉有霍起之理意者變瘧或旬日不曉飢餓竟有諸矣杏仁竹茹花粉犀角橘紅半曲鬱金汁丹皮又犀角生芍條芩生地丹參側柏熱深日多至於動血血屬陰象主乎養胎邪熱乘襲胎元難固因此變症有諸況嘔家最能傷胎今脘痞潮熱為病證徒攻病置胎氣於不理非也川連條芩知母烏梅生芍枳實汁脈左數下重熱入血中恐胎難保暮夜煩躁無寐亦是陰傷太僕所云寒之不寒為無水當益其陰今日衄血又來應減氣辛耗散仿苦寒佐以鹹寒為治黃芩川連人中白白芍知母元參脈形細小搏數舌刺肌燥津液告涸嘔逆煩冤食粥乃定胃氣已虛慮有變證清熱安胎為主更兼養胃川連竹菰知母元參麥冬條芩心中熱舌生刺暮夜煩躁覺熱嘔逆觸動少腹一團熱氣熾甚陰傷胎元未能穩保頻頻叮嚀主家視參如毒奈何與王先生再議他法生地炭天冬知母阿膠川斛茯神少陰中暑陰液已涸舌痿形縮齒板燥煩躁多日食瓜腸滯大下此陰不主收攝矣證屬大危難以圖治勉擬竹葉地黃湯生地炭山藥白芍麥冬澤瀉茯苓丹皮竹葉潮熱耳聾汗出神識昏冒脈細數下垂入尺壯年熱病脈形如是之衰怕其昏厥在邇以上實下虛故也擬復脈湯法復脈湯去薑桂加蔗漿體瘦陰虧暑熱更劫津液風陽上燔為厥清神兼顧其陽議用景嶽玉女煎鮮生地知母竹葉心生石膏甘草連翹仁渴欲涼飲穢濁熱氣內蒸不知飢不大便不安寐九竅不和都是胃病舌白噁心病在膈上氣分用河間苦辛寒法石膏知母黑梔薑汁杏仁半夏厚朴暑邪數日發熱後左頤下腫神煩無寐擬進辛涼漸苦法連翹苦丁茶黑山梔馬勃鮮荷葉飛滑石勞倦夾暑熱不解鼻煤舌灰白咳逆痰喘潮熱自汗神識不清語言錯謬此邪結在裡病屬險途擬萬氏清心牛黃丸以驅蘊伏之邪冀其神氣清再商去其他病上焦之病多屬氣氣窒則上下不通而中宮遂脹熱病蒸灼喉舌疳蝕清氣之中必佐解毒連翹金銀花馬兜鈴水蘆根川貝白金汁川通草連朝驟熱必有暑氣內侵頭熱目瞑吸短神迷此正虛邪留清補兩難先與益元散三錢用嫩竹心二錢煎湯涼用當服緑豆清湯代茶暑熱吸受先傷於上初病咳逆震動血絡暑熱仍在見血治血已屬不法參入重劑傷及無病之地晡時頭脹潮熱咳嘔邪在氣分當推上病治下之旨西瓜翠白通草六一散白蘆根生薏仁暑濕上入氣分先受非風寒停滯用發散消導者治之不法邪入血分矣犀角竹葉緑豆皮連翹花粉益元散暑入營絡吐痰血以心營肺衛兩清法竹葉生地麥冬連翹元參川貝舌絳口渴夜熱神煩大便不實胸中痞悶乃伏暑入里非表散可解進開心胞一法竹葉犀角細葉菖蒲川連元參鬱金伏暑發熱經旬不解暮夜神識不清少腹脹痛大便不通穢濁蘊結慮其內閉痙厥之患清心牛黃丸汗出神煩晡時潮熱胃中痛至少腹熱邪凝結血分恐瘀滯之變進清血中之熱鮮生地丹參山梔銀花露丹皮元參鬱金汁白金汁上現衄血心痛殃及小腹晝靜夜躁常以寒栗宛如熱入血室前云邪在血中陰分已屬顯然滋清血藥正在以搜剔伏邪耳鮮生地犀角尖元參丹皮金銀花生芍小溲莖中痛是餘熱未清從下行也進導赤散法細生地知母黑山梔甘草梢丹皮麥冬金銀花小木通陰虛熱伏半月不解舌絳唇紫呼吸不利溺短赤便祕澀此皆辛散苦藥劫盡津液況兼精濁下淋熱氣已入至陰之界豈區區清解為治者生地麥冬炙草甘蔗汁阿膠雞子黃麻仁暑風不解身痛熱渴而嘔水結之象杏仁橘紅花粉豆蔻藿香半夏厚朴木瓜未病先遺陰氣走泄醫投柴葛荊防再泄其陽大汗淋漓寒熱愈甚長夏暑熱必兼濕氣足脛常冷邪在中上二焦恐陰弱內陷耳是投劑解其暑濕熱邪務在輕小為穩絲瓜葉杏仁黃芩花粉連翹鬱金豆蔻橘白勞倦傷陽當風沐浴衛外氣泄疏豁藥以柴葛再泄其陽雜以消導更耗其氣胃傷熱迫嘔逆氣衝但夏熱必兼濕邪周身掣痛法當酸苦安胃泄熱使厥陽稍平即商輔正川黃連枯黃芩薑汁炒竹茹炒烏梅生白芍鬱金冒暑伏熱引飲過多脾胃深受寒濕令人喘脹噫噦水濕結聚溺溲澀便難險篤之症仿古人暑門方大順散主之杏仁炮姜肉桂甘草冒暑伏熱引飲過多脾胃既受寒濕陽氣鬱遏不主轉旋遂痞結欲嘔古人以大順散溫中下氣為治杏仁炙甘草茯苓炒乾姜肉桂心半夏脈形略起按之短澀進溫中下氣似乎閃爍欲動知陽漸氣結有形非真食滯重著之物愚見不用寒涼犯胃以肥人之病慮虛其陽矧夏月陰氣在裡里之有形便是濁陰內經論諸痛為寒內客今暑熱蒸迫理無外寒然口食涼茶瓜果此水寒入脘未能即化為熱素因脾胃氣弱所致津液不運自有煩渴再驗舌色未必定以實熱但以辛香開氣之屬可以醒陽可以宣濁上下分布病機自減高明採取如何鬱金汁杏仁半夏白蔻仁厚朴塊茯苓又吳茱萸炒半夏槐枝木金鈴子塊茯苓病減六七胃中清氣未旋津液未肯分布故口渴喜飲豈是實火常山梅餅蘇胃生津午後進四磨湯一次人參烏藥桔梗鬱金各磨汁開水沖服年高體豐暑濕為陰邪肥人陽氣不足忽冷忽熱煩躁舌白飲水不多便溏溲數此濕邪傷太陰脾土陽氣內郁與邪相混漸延昏痙厄逆之變生白朮半夏茵陳厚朴橘紅茯苓暑必兼濕濕鬱生熱頭脹目黃舌腐不飢暑濕熱都是一般濁氣瀰漫充塞三焦狀如雲霧當以芳香逐穢其次莫如利小便省頭草厚朴廣皮寒水石茵陳白蔻仁杏仁茯苓滑石夏季暑濕先入氣分如泄瀉溲少皆濕熱鬱阻氣分六和甘露可證可據之方也省頭草杏仁米仁大麥白蔻仁橘紅茯苓時序濕熱與水穀內因之濕互異況舌白下利中陽已弱脈緩乾嘔而煩夏暑最怕發痙昏厥議通中焦之陽以驅濕杏仁半夏豬苓茯苓薑汁脈短無神並不口渴思飲水入欲嘔欲噦下利黃水八日來身熱汗出不解時時譫語防其昏厥瘛瘲是濕熱深陷入里議用桂苓甘露飲杏仁益智仁茯苓豬苓厚朴木瓜滑石澤瀉脈大舌白渴飲脅痛欲嘔濕熱阻其經隧寒熱未已議用木防己湯木防己杏仁知母薑汁石膏厚朴半夏舌白口膩痰多自利濕熱未盡中焦不運防變脹滿川連人參半夏白芍枳實茯苓熱邪內結耳聾自利稀水用瀉心法淡芩生淡乾薑枳實半夏川黃連白芍濕鬱太陰熱聚陽明舌黃口燥不欲食此熱因濕而生議用桂苓甘露飲白朮豬苓滑石寒水石茯苓澤瀉石膏肉桂酒客濕勝中焦陽氣素虧易痞易溏不飢不飽皆清陽不肯轉旋況煩勞傷陽亦屬內症發熱非外感所致也杏仁廣皮白煨姜茯苓厚朴白蔻仁半夏澤瀉服理中後胃痛泄瀉轉加心熱渴不欲飲必有暑濕內結暫用酸苦泄熱川連淡黃芩炒廣皮烏梅生白芍木瓜陽虛體豐夏熱耗氣胃弱不納不飢此九竅不和都胃病矣法當鎮逆理虛略佐苦降以胃為陽土氣下為順耳人參淡乾薑川連代赭石茯苓生白芍脈漸陰濁上僭與真武法減術換參真武法兩日脘中有知飢感與陽漸結痞無疑陰濁得泄即當溫養太陰使脾陽鼓動健運冀其納穀安然用治中法人參益智仁淡乾薑茯苓廣皮白木瓜潮熱耳聾有似陽邪診得脈空大自利不渴舌上粉苔形枯色槁豈是實證議以勞倦夾濕從脾胃病治人參廣皮白茯苓炮姜生益智仁澤瀉交夏形瘦食減氣怯欲寐世俗謂之疰夏後天脾胃不和熱傷氣也人參白朮炒楂砂仁桔梗茯苓廣皮神麯川連米仁熱痛失治三焦皆被邪結不甚清明左脅瘕聚有形食下漸脹大便日前頗利目今便祕是腸胃經絡之邪未清清空之竅尚蒙調治之法亦宜分三焦為法白金丸可用午後進湯藥熱邪深入為厥陽氣上冒神昏病魔多日已在血分況臍下堅滿乎仲景云厥應下下之不止利者死凡鹹苦皆通陽均謂之下不必硝黃也陰陽兩為病傷熱邪深陷至陰陰液涸盡遂躁亂不已已屬至危思從前諸醫發散消導苦寒辛燥都令劫爍陰陽仲景云凡元氣有傷而病不減可與甘藥仿此復脈湯夏令熱伏入秋而發即仲景謂陰氣先傷陽乃獨發之謂脈右搏數胃汁受損暫忌厚味進甘寒養胃內熱自罷捲心竹葉知母大麥仁麥冬白芍烏梅肉夏令伏邪至深秋而發發汗不解繼又泄瀉此伏里之證與暴感不同所以表散和解不能取效病有四旬脈細搏如刃面色消奪猶裡熱口渴舌色白病中潰泄此久熱迫蒸陰陽失守苦藥燥損津液日枯因熱致病醫不以河間三時法則分三焦以逐邪昧於從事節庵陋習宜乎淹淹不已若不急調久延虛怯一途古人所謂因病致損也慎之捲心竹葉生地炭生白芍米炒麥冬炒丹皮烏梅肉伏暑深秋乃發是屬裡證雖經遺泄系陰虛夾邪忌用溫散再傷陰液今自利口渴腹滿可與四逆散方法黃芩枳實六一散生芍廣皮白夏季暑熱內伏秋涼伏邪內發初起耳竅流膿已非風寒在表今十餘日大便不解目黃赤舌起黃苔耳聾昏譫漸有內閉之狀非輕症也連翹黃芩大黃黑梔生甘草枳實急火煎四十沸即濾清服濕熱之邪鬱於氣分身熱目黃自利夏月受之深秋而發木防己杏仁黃芩生石膏枳實白芍脈沉目黃氣喘嗆嘔脘悶肢冷潮熱汗出略緩少頃復熱病九日不解口乾自利此濕邪內勝為熱三焦不通夏伏至霜降而發其病為重杏仁半夏山茵陳鮮石菖蒲厚朴草果仁茯苓皮川通草久痛用辛溫兩通氣血不效病已十年不明起病之由今便溏溺赤水穀濕熱不運必夾濕阻氣主以分消薏苡仁厚朴豬苓茯苓皮蔻仁山茵陳澤瀉又香砂平胃散加茯苓茵陳酒客濕熱內蘊長夏濕熱外加醫不曉客邪兼有宿病發散消導胃汁大傷先利黏膩繼而吐血今兩跗麻痹膝中逆冷陰液枯涸脈絡少氣舌絳煩渴溺赤短澀熱未盡本先奪僂廢之象恐不能免滑石生石膏寒水石白芍川柏麥冬鮮生地阿膠炙草麻仁舌白心黃濕著太陰食不運嘔吐杏仁廣皮白草果仁藿梗厚朴半夏痛脹得吐而安隨發寒熱口苦目黃皆濕熱內擾胃口不清靈樞謂中氣不足溲便為變矣柴胡花粉穀芽生薑黃芩半夏枳實大棗暑濕雖去胃氣未復務宜薄味靜養勿令客邪再擾川石斛廣皮半夏曲煨益智仁茯苓青皮熱穢上加頭脹脘痞宜蔬食清上竹葉心桑葉黃芩連翹花粉杏仁脈沉舌赤邪入血分煩躁神氣欲昏用竹葉地黃湯竹葉心浙生地犀角尖連翹心元參細葉菖蒲初病伏暑傷於氣分潮熱渴飲邪犯肺也失治則遂傳膻中遂舌絳縮小便忽閉鼻煤裂血環口瘡蝕耳聾神呆此氣分之邪熱漫延於血分矣夫肺主衛心主營營衛二氣晝夜流行於經隧之中與邪相遇或涼或熱今則入於絡津液被劫必漸昏昧所謂內閉外脫犀角尖元參心金銀花鮮生地連翹細葉菖蒲根心營肺衛同治鮮生地蔗汁生甘草梢麥門冬花粉暑濕本陰邪必傷於氣分久則三焦均受自頭巔胸脅流行皆阻便溺不爽但濕久而生熱治濕必究其本桂苓甘露飲伏暑得新涼身熱咳嗽治在肺舌白不溻囊腫暑必兼濕濕滯為腫蘆根茯苓淡竹葉杏仁通草燥病形脈俱虛不飢不食積勞虛人得深秋涼氣外侵引動宿邪內蒸而為煩渴已非柴芩半夏之症急救津液以清伏邪竹葉生地梨汁連翹麥冬蔗汁不治失血獨取時令濕邪得以病減凡六氣有勝必復濕去致燥來新秋暴暑爍津且養胃陰白露後可立調理方麥冬人參大棗半夏生草粳米脈虛數形寒心中煩熱五更後氣升咳嗆當秋分節燥金司令大熱發泄之餘皆能化燥肺為嬌臟最處上焦先受其沖宜潤燥以滋其化源冬桑葉南花粉生米仁大沙參玉竹蜜炙橘紅用白糯米三合淘淨流水泡取極清湯代水煎服夜來咳嗽略稀即得假寐目瞑夫溫邪內熱津液被劫已屬化燥而秋令天氣下降草木改色肺位最高上焦先受大凡濕由地升燥從天降乃定理也今皮膚甲錯肌肉消爍無有速於是也茲論氣分主治以上焦主氣也議用喻氏方減去血藥以清燥專理上焦經霜桑葉玉竹甜杏仁枇杷葉甜梨皮花粉將濾入生石膏末二錢初秋咽痛發嗆是氣交中暑熱燥氣從呼吸而入肺位最高清空失司惟輕清可解藥過於苦辛寒胃傷食減而上焦仍窒古人謂金空則有聲聲嘶脈數有肺痿之慮甜水梨兜鈴北沙參川貝母訶子皮蔗漿甜杏仁熬膏寒病傷寒病發汗後表不解乾咳嘔逆夜不得臥遵古人小青龍法杏仁桂枝乾薑白芍米仁石膏五味甘草下焦陰陽素虛雪地奔走寒從口鼻而入肺受邪則上逆而喘陽受傷則漐漐汗出由中邪入表散無益宣其肺逆喘緩可救桂枝乾薑杏仁白芍五味茯苓煩勞遇冷營衛交窒虛人夾邪只宜輕劑疏解桂枝炙草杏仁白芍大棗茯苓嘔惡腹痛舌乾不喜飲脈左弱右大勞倦中寒脘中格拒皆是太陰見證古人有生料熟料五積散因爰其意候裁杏仁草果仁半夏厚朴廣皮煨姜冷氣吸入即是寒中太陰與霍亂互參正氣散冷香引飲闢穢蘇陽即效而脾胃陽氣未為全復議用治中湯數劑夜分清虛為妙人參生益智仁砂仁煨姜廣皮茯苓皮木瓜暴冷從口鼻入直犯太陰上嘔下利腹痛為中寒陰症脈細澀欲絶急急溫暖中下之陽人參淡乾薑生芍焦術淡附子茯苓因脘中痞悶去朮之緩中再加桂枝以理陽人參桂枝乾薑附子茯苓白芍又人參白芍附子茯苓甘草冬溫高年水虧溫邪深入陰分熱在裡外象反冷熱傷陰則小溲欲痛皆冬溫本病仲景以存陰為章旨奈何醫藥以桂枝附子辛熱再劫干津液是何意見生地阿膠炙甘草麥冬炒麻仁生白芍溫邪水虧熱入脈細數口渴舌絳不知飢餓皮膚乾涸甲錯熱劫津液務以存陰為先不當以苦寒反令化熱復脈湯舌乾不喜飲腹鳴下利皆陰液不肯上注亦屬枯槁之象仲景於邪少虛多每以復脈湯升其津液復脈湯去桂枝麻仁衝入青蔗漿一杯腎虛溫邪內入形神消爍無寐廢食臨晚寒熱得汗而解議用復脈湯去姜加芍脈左搏右細顴赤氣喘咋夜大便後汗泄竟夕不安冬溫伏熱陰衰陽冒之象最屬重症生地炭炒麥冬蔗汁炙甘草生白芍腎虛溫邪內入熱迫液傷舌白不知飢不欲食宗仲景邪少虛多例以甘藥用復脈法炙甘草麥冬肉桂枝人參大麻仁生地冬溫水虧上焦熱熾生地六味湯去萸肉加生白芍雞子黃小麥溫邪暮熱由乎陰虛陽浮熱解無汗不欲飲水豈是陽經為病冬令失藏法從腎肝論治阿膠生地炭炙黑甘草小麥生白芍炒鬆麥冬容色消奪脈形漸細不知飢不欲納捫之不熱而自云熱並不渴飲間有寒栗之狀此營衛不振當治中焦人參炮乾薑益智仁茯苓木瓜生白芍著右臥稱甚氣悶陽明氣未全降宜補土降逆人參白旋覆花生白芍茯苓代赭石南棗肉脈左動是陰虛溫邪深入但大苦直降恐化燥劫津陰議以甘鹹寒之屬鮮生地竹葉心生甘草元參心麥門冬氣喘痰鳴鼻竅焦黑溫邪上受腎真下竭陰不接陽神識日迷皆是衰脫之象據右脈散大無緒黃昏面色戴陽少陰雖絶當宗河間法復入清上滋其化源熟地炭淡蓯蓉白茯神牛膝炭天門冬石菖蒲溫邪十四日舌絳渴飲面帶油亮此水虧熱入營分最防昏厥當清其血中之邪以存陰液鮮生地知母生白芍竹葉心麥冬丹皮冬溫氣熱深入少陰舌赤心黃潮熱不渴大旨當存陰為要勿令昏憒鮮生地知母生白芍竹葉心麥冬丹皮冬溫脈數舌赤口渴暮甚水虧熱侵陰分杏仁赤芍花粉黑梔桔梗連翹廣皮溫邪入肺上唇高腫初起病在氣分治以苦辛寒輕劑不得犯中下二焦薄荷連翹杏仁牛蒡黑梔皮生石膏溫邪上受肺氣脾塞周身皮膚大痛汗大泄坐不得臥渴欲飲水乾嘔不已從前溫邪皆從熱化議以營衛邪郁例用仲景越婢湯法杏仁桂枝木茯苓炒半夏生石膏寸搏咳逆骨痛暮熱溫邪入肺營衛不和議清氣中之熱佐以通營桂枝白虎湯冬溫熱入爍及筋骨非風寒襲筋骨痛宜汗之比生津清熱溫邪自解桂枝木知母杏仁花粉滑石甘草冬溫伏邪先厥後熱熱深從里而發汗出煩躁當救胃汁竹葉心烏梅肉川石斛麥門冬生甘草生穀芽藏真下虛陽挾上冒胃少納不飢齒根實腫巔頂麻痹素多郁遏驟難溫補況今冬溫正少藏熱易入姑擬輕劑鹹苦軟結升降俾厥陰陽明稍和另商損益調理黃芩川石斛栝蔞皮牡蠣木瓜山楂陰虛體質復加勞力奔走致陽氣亦傷舌邊赤中心黃咽乾腹膨熱在裡脈氣結聚胃失司降當進解鬱清燥杏仁炒黃竹茹栝蔞仁紫菀金石斛廣皮白過暖氣泄失冬藏之用此病後煩倦痰嗽帶血高年上實下虛即如冬溫客氣無辛散之理甘涼潤劑與胃無損為宜桑葉杏仁黑梔玉竹白沙參象貝冬溫為病乃正氣不能固藏熱氣自里而發齒板舌乾唇燥目漸紅面油亮語言不爽呼吸似喘邪伏少陰病發三焦皆受仲景謂發熱而渴者為溫病明示後人寒外鬱則不渴熱內發斯必渴耳治法以清熱存陰勿令邪氣焚劫津液致瘛瘲痙厥神昏譫狂諸患故仲景復伸治療若非一逆尚引日再逆促命期且忌汗下忌溫針可考九日不解議清膈上之熱竹葉杏仁花粉淡黃芩連翹橘紅滑石鬱金汁瘧疾脈弦口渴少陽寒熱乘胃劫津可與小柴胡湯和正以解邪小柴胡去半夏加花粉白芍脈右軟左弦寒熱漸早口渴喜飲此胃津日損木火尚熾生津養胃以扶正辛酸兩和木火之鬱熱柴胡人參麥冬橘紅黃芩知母白芍烏梅又生鱉甲知母烏梅炒桃仁丹皮草果白芍又人參知母金石斛川連烏梅茯苓不知飢飽大便溏泄三次寒熱犯中脾胃不和未宜純補議用四獸飲意人參草果仁炙甘草茯苓廣皮木瓜陰虛之體冷熱失調為瘧寒熱重傷胃津為嘔吐夏至後病暑宜生津和陽以安胃口勿徒消克嫩竹葉金石斛廣橘紅知母製半夏木瓜津傷復瘧寒熱煩渴桂枝白虎湯加花粉脈弦如刃煩渴脘痞嘔吐蛔蟲上升此胃氣已慮暑熱復入三焦不行客氣逆乘況病後調理失宜本虛標實姑進安胃降逆冀得嘔逆緩氣道稍順再議川連烏梅肉枳實汁川椒生白芍生薑暑熱未退胃氣已虛蛔逆中痞嘔吐涎沫是厥陰犯胃胃氣有欲到之象進安胃法進安胃法嘔逆稍緩夜寐神識不安辰前寒戰畏冷是寒熱反復陰陽並傷有散失之勢擬救逆法鎮攝陰陽得安其位然後病機可減龍骨桂枝木人參牡蠣生白芍蜀漆交寅卯兩手及臂冷是脾胃虛陽失旋運至午前復溫以陽旺於日中故雖進稀粥脘中痞悶議進治中湯健運中宮使肝邪不敢戕伐中土所謂瘧痢之病多因脾弱也人參半曲烏梅茯苓益智仁廣皮木瓜澤瀉瘧後胃虛客氣易逆吐涎沫不知飲食進養胃制肝法人參半夏曲桂枝木龍骨烏梅陳皮白生白芍牡蠣脈弦遲形寒神倦得之憂思驚恐衛外陽氣暴折陰寒不正之氣得以乘襲將有瘧疾病機宜靜攝護陽庶外邪不至深入為害當歸建中湯去姜加牡蠣形色脈證俱虛寒熱結耗胃津脘中不知飢餓二便皆覺不爽徒進清熱消克中宮更是坐困考古暑病凡旬日不解必當酸泄矯陽以蘇胃汁元虛之體恐滋變病桂枝木生牡蠣炒烏梅生白芍炒蜀漆大棗又去大棗加龍骨體虛溫瘧當從和正解邪禁用柴荊發散及沉重傷下藥桂枝木黃芩杏仁花粉生白芍半夏曲橘紅豆蔻寒熱由四末迫劫胃津是以病餘不食不飢叨叨汗泄當養胃陰生津以俟克復人參捲心竹葉生芍茯苓麥門冬麻仁溫瘧陰傷足熱陽亢病發日早六味去萸肉山藥加人參生芍生鱉甲熱邪入肺為溫瘧桂枝白虎湯但熱無寒咳嗽漸嘔周身疼楚此為溫瘧伏邪日久發由肺經宗仲景桂枝白虎湯二劑當已桂枝白虎湯加麥冬疸瘧邪在肺口渴骨節煩疼桂枝白虎湯肺瘧咳逆欲吐蘆根汁花粉杏仁半夏曲橘紅勞怯一年近日頭脹潮熱口渴乃暑熱深入為疸瘧也金匱云陰氣先傷陽氣獨發為病不必發散消導再傷正氣但以甘寒生津和陽務使營衛和熱自熄北沙參知母生鱉甲麥冬烏梅生白芍夏暑久郁為疸瘧熱勝則肺胃津傷五心熱多咳故薄味清養自能向愈甘寒除熱生津方進商麥冬花粉竹葉沙參甜杏仁甘草暑風入肺為闡瘧金匱謂陽氣獨發嘉言云體陰素虛而所伏暑氣日久混入血分陰虛陽冒上焦清竅皆蒙胃陽失和不納易痞究竟伏邪未去凡苦辛疏滯都屬禁例夫上實下虛有客邪留著鎮降決不應病仿之才輕可去實之例分別氣血以宣之逐之青大竹葉連翹犀角鮮荷葉汁元參通草脈數稚年陰氣先傷陽氣獨發暮夜潮熱天曉乃緩由夏暑內伏入秋乃發病名疸瘧色白肌瘦久熱延虛不可汗下消導再傷陰陽舌邊赤中心苔膩兼欲嗆咳熱灼上焦肺臟亦病法宜育陰制陽仍佐清暑肅上用景嶽玉女煎鮮生地石膏生甘草麥門冬知母竹葉心熱勢減半脈猶徑數夏季久伏之邪由里而發汗泄不能解徹稚年陽盛陰虛病當夜甚從河間三焦並清法甘露飲脈數右大渴飲神迷聞聲若在甕中舌邊赤苔有刺伏暑必挾濕化瘧熱蒸迫從傷津胃汁不復脘中常悶夫熱病以存陰為先瘧已半月須參里症議清胃生津若景嶽玉女煎之屬鮮生地麥冬竹葉生石膏知母甘草體質陰虛暑邪深入著熱漸渴汗泄可解此仲景所謂陰氣先傷陽氣獨發病名疸瘧妄投苦辛消導胃津劫損氣鈍不知飢矣竹葉心鮮生地滑石知母牡丹皮生草營液劫盡邪透膻中遂心熱惶惶難訴苦況丹溪謂上升之氣自肝而出況先厥後熱亦是肝病用紫雪芳香走竄勿使里邪結閉耳湯藥用飲子煎法取輕清不滯僅解在膈上之蘊熱議用景嶽玉女煎鮮生地知母竹葉風米麥冬石膏生草脈左盛邪留在血寒熱頗減未已滋清裡熱以俟廓清不必過治鮮生地生鱉甲知母天冬丹皮花粉仲景云凡元氣有傷熱邪不去者當與甘藥人之一身不外陰陽二氣而成知陽虛用建中陰虛用復脈斷斷然也是方全以復脈甘藥護身中陰液劉河間加入三石名曰甘露飲子蓋滋清陰藥能救陰液並能驅逐熱邪之深伏上焦如霧滑石之甘淡以驅之中焦如漚石膏之甘辛寒以清之下焦如瀆寒水石之甘鹹寒以泄之俾去邪不損真陰非柴胡鱉甲之比方名飲子取重藥以輕投斯入陰不滯攻邪不伐又與湯散方法迥異耳夏月最宜進商奈世人忽而不究者頗多故辨及之復脈湯加三石春季失血是冬藏未因陰虛本病無疑小愈以來夏至一陰未能來復血症再來原屬虛病今診得右脈急數倍左面油亮汗淋涕濁舌乾白苔煩渴欲飲交午未蒸蒸發熱頭脹周身掣痛喘促嗽頻夜深熱緩始得少寐若論虛損不應有此見證考金匱云陰氣先傷陽氣獨勝令人熱勝煩冤病名疸瘧要知異氣觸自口鼻由肺系循募原直行中道布於營衛循環相遇邪正相併則發熱矣津液被劫日就消爍火熱刑金咳喘為甚此與本病虛損劃然兩途仲景定例先理客邪新病恐補則助邪害正耳是以右脈之診為憑議當辛甘之劑驅其暑濕之邪必使熱減議調本病勿得畏虛養邪貽害至囑桂枝知母麥冬石膏甘草粳米前法大清氣分兼通營衛石膏佐以桂枝清肺為多其餘皆滋清胃熱仍有生津之意今診兩手相等小數交未末熱勢較昨似輕右脈不甚急搏而心熱煩悶作渴之象如昔驗舌苔乾白舌邊過赤陰虛之體其熱邪乘虛入三焦皆有諸矣況冬病風寒必究六經夏暑溫熱須推三焦河間創於宣明論中非吾臆說也凡熱清片刻議進甘露飲子一劑服至五日再議滑石生石膏寒水石桂枝白芍麥冬鮮生地阿膠人參炙草火麻仁先用清水二盞空煎至一半入藥煎四五十沸澄清冷服未病形容先瘦既病夜熱早涼猶然行動安舒未必真重病傷寒也但八九日病來小愈驟食粉團腥面當宗食谷發熱損谷則愈仲景先未嘗立方引腹痛洞泄食滯阻其腸胃火腑不司變化究其病根論幼科體具純陽瘦損於病前亦陽亢為消爍仲景謂疸瘧者但熱不寒本條之陰氣先傷陽氣獨發熱爍煩冤令人消爍肌肉亦不設方但曰以飲食消息主之嘉言主以甘寒生津可愈重後天胃氣耳洞瀉既頻津液更傷苦寒多餌熱仍不已暮夜昏譫自知胸膈拒痛腹中不和此皆病輕藥重致陰陽二氣之殘憊法當停藥與谷諒進甘酸解其煩渴方有斟酌瘧來嘔吐失血成塊且多乃平素勞傷積瘀因寒熱攻動胃絡瘀濁遂泛血後肢冷汗出陽明虛也但瘧邪仍來口渴胸痞雖是熱邪未盡然苦寒枳朴等藥再伐胃氣恐非所宜鮮生地生鱉甲知母生白芍牡丹皮竹葉心瘧熱攻絡絡血湧逆脅痛咳嗽液被瘧傷陽升入巔為頭痛絡病在表裡攻之不肯散議搜血分留邪伏熱鱉甲丹皮知母鮮生地桃仁寒水石面赤口渴脈大而空勞倦夾虛不可純作時瘧感治桂枝木炙甘草泡淡黃芩生白芍南棗肉生薑脈空搏面赤舌白消渴汗出晝夜不已兩足逆冷寒熱潮遲此積勞陽虛外邪易陷本虛標實復進柴葛加消導謂之劫津仍宜和營主治歸建中去糖又淡黃芩知母花粉烏梅廣皮白製半夏草果枳實白芍外寒勢緩熱渴勢甚此少陽木火迫劫胃汁脘中津衰熱蒸痰飲倘飲水過多中焦不運恐為水結仿白虎之意不泥其方以示勿太過耳鮮竹葉飛滑石烏梅肉麥門冬知母生白芍胃為肝陽之擾沖氣如厄熱時煩躁不眠純屬裡證法當酸苦泄熱俾陽明凝和知母淡黃芩生鱉甲捲心竹葉丹皮生白芍烏梅肉胃虛熱氣上行故覺氣塞當養胃陰生津使陽和則邪清積勞有年之體甘寒為宜人參竹葉知母粳米麥冬石膏生甘草又鱉甲煎丸早服七粒午時七粒暮時七粒白滾湯送下又生牡蠣桂枝木人參花粉生白芍烏梅肉間日瘧脈弦煩渴無汗頭微痛往來寒熱欲嘔可與小柴胡湯柴胡人參生薑黃芩半夏寒熱雖止心熱口渴營分餘邪未解仿景嶽玉女煎意滋清營熱此伏暑可去生地知母生甘草生白芍生石膏竹葉心口鼻吸入上焦先受因陰虛內熱體質咳嗽震動絡中逆致血上而脹煩渴寒熱究是客邪先以清暑方法杏仁竹葉心黑梔皮連翹心石膏荷葉汁陰虛者邪未盡疸熱汗解用景嶽玉女煎石膏竹葉心生地知母麥冬白芍夏季瘧發溫熱恆多攻下動里里傷邪陷變痢大痛利頻不爽強食脘中遂脹濕熱阻遏氣偏滯也況久病大虛恐有變厥之慮黃連黃芩人參烏梅白芍當歸手指尖及背部皆寒唇舌亦皆麻木夫背為陽脈經行之所四肢亦屬諸陽之本況麻為氣虛凡陰傷陽無不損當撤去苦寒進和中制木意人參炙草炒白粳米新會皮木瓜白芍炒荷葉蒂脈大右澀舌白鼻竅乾黑不飢不食由暑濕內伏新涼外來成瘧汗泄表解伏氣未罷填塞胸臆餘熱結於氣分思得肺化如秋冬天降則清肅令行況初病身痛亦濕熱阻氣之象諸家不及道此栝蔞皮杏仁黑梔鬱金川貝枇杷葉肥人多痰多濕暑熱夏受秋深涼來伏熱乃發汗多不解非關表寒煩渴喜飲均是里病肺失降而胸痞悶濕邪盛而戰栗多濕熱合邪同時氣分是太陰陽明之瘧醫不分經絡混治所以旬日之外邪未退舍也木防己杏仁炒半夏枳實汁生石膏炒厚朴生薑汁巔脹汗多脘痞欲嘔熱多寒少初因遺泄陰傷伏暑內發為瘧忌用柴葛再泄其陽淡黃芩花粉蔞皮杏仁醋炒半夏豆蔻橘紅飛滑石寒熱已止脘痞不飢此清陽不主運通益氣佐以芳香醒中人參白蔻仁炒白芍陳皮炒半夏茯苓舌灰白胸痞瘧來欲嘔昏厥熱時渴飲此暑熱不解邪欲深陷議瀉心法黃連黃芩厚朴半夏杏仁薑汁脈數舌邊白暑濕熱內伏為瘧嘔逆胸滿間日寒熱邪勢未解議以酸苦泄熱主治川連草果仁黃芩廣皮白烏梅知母半夏生薑脾腎陽虛背寒吐涎邪雖未盡又慮正傷扶正驅邪以冀劫瘧人參草果仁炒焦半夏生薑烏梅肉新會皮粵中陽氣偏泄途中煩勞涉虛暑熱內伏涼風外加瘧來間日者邪深不得與衛氣陽也但客邪六氣總化為熱吐蛔消渴噦逆厥陰陽明病也里證顯然柴葛泄表動陽須忌川黃連人參黃芩烏梅肉生薑汁枳實半夏生白芍病起腹痛泄瀉繼而轉瘧舌膩渴不能飲嘔逆吐痰脘中熱悶乃暑熱內伏足太陰之陽不主旋轉運通有以霍亂而起緣未及分經辨證邪留不解有內結之象不特老人質弱如今霜降土旺天令欲收邪勢未衰未為穩妥議用瀉心湯法淡黃芩川連杏仁炒半夏厚朴薑汁頭痛惡心嘔涎冷自四肢起舌白渴飲胸痞悶眼白帶黃汗多乃太陰濕瘧也夏秋伏邪而發並非暴受風寒不可發散杏仁枳殼廣皮白半夏藿梗蔻仁厚朴薑汁瘧發於秋名曰伏氣兩旬不解消滯清火而不見效寒少熱多口渴喜暖心中懊憹不能自主是無形氣結蔞連枳半只治有形有滯寒熱未能開提懊憹氣結況無汗為煩表裡氣機不行顯然窒閉宗仲景梔豉湯一升一降以開其結梔子香豉各三錢浴後寒熱衛陽損也用建中湯人參歸身桂枝木蜜姜黃耆炙草白芍大棗陽氣發泄寒熱脈大蜀漆龍骨人參桂木牡蠣生芍左數甚人參五味山藥熟地芡實茯神左數寒熱人參桂枝木南棗炙草煅牡蠣又人參生白芍生牡蠣烏梅肉炙甘草小麥又何人飲又鱉甲煎丸從來通則不痛通者非流氣下奪之謂作通陰陽訓則可閲內經論痛都因寒客今脈左搏而大氣墜便不爽宛是陰液少氣失疏泄議用辛酸甘緩而和體用小茴香炒當歸生白芍另參湯遠藥進又熟地炙草山藥秋石丸五味白芍茯神脈左細右空小産亡血未復風邪外襲營衛孔隙寒熱汗出視目紫晦面色枯痿其真氣衰奪最慮痙厥之變此辛甘緩和補法以護正托邪人參白朮乾薑桂枝炙草脈虛數舌白身痛脘痞有痰寒熱日遲此陰陽兩損時令濕邪外薄內應太陰謂之虛邪宜從中治人參半夏知母生薑茅朮陳皮草果仁烏梅肉夜來忽然昏暈目無光筋骨痛營液暗損任督皆憊之象人參炙甘草鹿茸當歸酒炒白芍鹿角霜自昏厥以來耳聾舌白嘔逆涎沫大便不通必有暑邪吸入胃脘此肝氣升舉諸陽皆冒腑氣窒塞恐內閉昏脫最為可慮體虛夾邪先清邪以安胃議以酸苦泄熱驅暑暑汗無止澀之例總以勿進表散乃里症治法也川連黃芩廣皮白烏梅肉生薑汁炒半夏枳實兩脈皆起神氣亦蘇但大便未通中虛舌白理難攻下況肝虛易驚又屬瘧傷致厥仲景雖有厥應下之文驗諸色脈不可徒執書文以致誤人參半夏生白芍川連枳實烏梅肉前此未盡瘧邪仍至兼之惱怒肝氣結聚中焦補虛之中必佐散邪開結人參生牡蠣白芍橘紅炙鱉甲丹皮産後下虛利後為瘧是營衛交損況色脈並非外邪補劑頻進不應由治錯亂經云陽維為痛苦寒熱人參桂枝木炒當歸鹿角霜炙甘草炮黑姜積勞傷陽哀戚動藏重重內損其夏秋伏邪已深在重圍此從陰經而來朱漢老非治時邪病人服藥而安溫藥助陽也考三陰而投溫補扶正正謂托邪知母入咽即厄陽明之陽幾漸不飢不食不寐陽不流行三焦困脾胃憊矣肛墜屬陰傷氣陷難任純剛之劑人參當歸米炒厚朴麋角酒浸烘炮姜草果陰瘧足太陰經先進柴胡薑桂湯柴胡黃芩栝蔞根甘草桂枝乾薑生牡蠣瘧兩旬不解寒多熱少是為牝瘧進牡蠣散牡蠣龍骨肉桂白芍雲母蜀漆炙草大棗牝瘧寒多內熱心悸陽旦湯加生牡蠣花粉勞瘧不止肢腫寒多陽旦湯加牡蠣雲母石陰瘧四月汗泄下肢腫早服八味丸淡附子細辛生白朮澤瀉厥陰陰瘧不止能食熟地炭淡蓯蓉牡蠣五味子鹿角霜龍骨陰瘧三年不愈下虛遺泄蜀漆牡蠣炙黃耆桂枝龍骨炙甘草陰瘧久虛益氣湯加附子陰瘧脈沉漸背寒肢冷脘中食入痞滿此屬陽氣傷極春深木旺恐變浮腫脹病宜理中兼理下焦勿得驅邪治瘧附子桂枝人參湯加塊茯苓生薑大棗冬月伏邪至春發為溫瘧汗出不解非因新感可知脈虛先有遺症忌進耗散真氣和正解邪為穩桂枝草果杏仁白芍枯芩桔梗瘧由四末必犯中焦胃獨受其侮克故煩渴脘痞不飢今日舌絳便溏陰氣先傷陽邪未盡宜芩芍和里益以瀉木邪救胃陰黃芩丹皮白蔻仁白芍青蒿烏梅肉經月瘧後易生嗔怒春令內應肝膽其用太過其體尤虛所以自覺餒怯考仲景一月瘧來痊期血氣凝結脅中必有瘕聚名曰瘧母母者瘧邪病根也鱉甲煎丸主之使氣血通行留邪無可容矣服露姜飲頗逸第寒熱仍來知邪伏於陰不得透解大便不通又經旬日議從厥陰搜逐使肝遂疏泄可望瘧止每天明午刻交子各用鱉甲煎丸七粒連進六日斯三陰三陽皆通邪無容足之地矣瘧久邪入絡絡主血邪結血分則為瘧母仲景鱉甲煎丸專以升降宣瘀治肝謂寒熱不離少陽久必入肝肝主血左脅為肝膜俞也攻病固當如是但缺有遺精食少不化諸恙病非一端此攻邪溫補未能動病莫若養正氣旺邪自除古有諸矣午服妙香散晚服阿魏丸久瘧針挑汗出乃止經脈邪去絡脈留邪脅下遂結瘧母按之堅形高突四年帶病仍然能食便通其結聚不在腸胃藥下咽入胃入腸不效蓋絡脈附於臟腑之外廓耳生鱉甲青色刮去衣四兩穿山甲炙二兩五靈脂燒至煙盡為度二兩麝香忌火另研五錢辰砂忌火另研水飛五錢上藥各研淨末分兩加入阿魏一錢同搗丸飢時服二錢三瘧已久自述煩勞必心胸痞脹凡勞則傷陽議溫養營分托邪一法人參桂枝炙甘草南棗茯苓蜀漆當歸身生薑瘧三日乃發是邪伏在陰經年雖止正傷難復衛陽外泄汗出神疲宜甘溫益氣之屬五旬向衰必節勞保養不徒恃藥養營法用煨姜三兩南棗四兩煮汁泛丸三日瘧是邪伏陰分而發非和解可效久發不止補劑必以升陽引伏邪至陽分乃愈守補藥則非鹿茸人參熟附子炒黑杞子鹿角霜當歸茯苓炒沙苑稚年三日瘧太陰脾傷為多飲食忌用腥膻劫邪繼以升陽常山白朮厚朴草果陳皮薑汁診左現小數右緩濡溺食已煩倦是脾陽漸衰古人謂瘧痢都因脾弱也況便溏足冷色奪形瘦若不急補後天以崇母氣區區疲藥元氣消憊矣用局方加味四獸飲人參熟術草果仁廣皮茯苓炙草烏梅肉此勞傷陽氣之瘧循環不已脈絡久空當升補陽氣生耆炙草生薑鹿角當歸南棗露姜飲止瘧是益中氣以驅邪虛人治法皆然脾胃未醒忌進腥濁人參炙草半夏益智仁橘紅薑汁陰泄陽冒頻遺鼽衄寒熱消渴氣上撞心欲寐驚惕飲多嘔逆兩足如墜莖中凝窒金匱謂陰氣先傷陽乃獨發見瘧厥陰經瘧與上焦治異鮮生地知母生甘草梢元參川斛竹葉熱病時瘧不分清理在氣在血以發散消導劫傷胃汁遂不飢不食突遭驚駭肝陽暴越復令倏熱倏涼兩足皆冷腹脹不和脅中有形觸痛由久病入絡陰陽不通二便窒閉先與更衣丸二錢俟半日後大便得通次日用藥當以兩和厥陰陽明方法生牡蠣柏子仁生白芍川楝肉小黑豆皮細根生地瘧熱傷陰陰液不得上承舌心捫之如板目瞑面腫驚惕肝陽化風內震胃氣愈逆脘痞欲人撫摩熱氣聚膈蒸迫膻中必至神昏閉塞老年凶危俄頃然非形質之結清寒攻蕩可效況已瀉利在前邪陷陰傷顯然夫陰傷屬下熱聚居上救陰之劑未遑透膈以滋下芩連涼膈苦辛燥氣再傷陰究非至當展轉籌劃法宜分理議於今晚先進清心牛黃丸一服勻三次溫開水與服取其芳香清燥以開其結明日再診議方冒暑遠行熱氣由口鼻入犯上犯中分布營衛故為寒熱瘧疾當淡薄食物清肅胃氣投藥以涼解芳香或甘寒生津皆可療此奈何發散以去寒不知口鼻受熱與皮膚受寒迥別治之不效肆行滋補參朮耆地黏膩中宮肺氣壅閉胃中滯凝腫脹每上至下一身氣機不通張戴人所謂邪得補而勢盛如養寇殃良之比但病久形消矯其非而再為攻逐又慮正氣之垂寂故改湯為丸丸者緩也使中焦得疏漸漸轉運升降得宣六腑有再通之理腑通經脈之氣無有不通者矣每日進丹溪保和丸左脅下宿積有形今瘧瘧反復左脅又結瘧母胸脘痞悶大便艱難乃瘧症餘邪與氣血膠結六腑亦因之不宣宜攻以通其瘀滯先進鱉甲煎丸三錢早上午時暮時各用七粒開水送下瘧邪未盡堵截氣窒致腹滿足腫氣逆欲喘水濕內蘊治當分利杏仁牡蠣豬苓厚朴澤瀉茯苓瘧止太早邪熱未盡脘痞不飢口渴自利防有滯下川連黃芩半夏枳實白芍橘白同議上下合邪泄厥陰以安陽明仍佐肅清暑濕方法桂枝木川連人參生牡蠣烏梅白芍痰哮由外邪而發坐不得臥腎病為多以風寒必客太陽體弱內侵少陰耳若夫暑濕熱氣觸自口鼻背部瘍癤乃鼻竅應肺是手經受邪辛涼氣輕之劑可解以肺欲受辛其象上懸氣味沉重藥力下走而肺邪不解然夏病入冬氣候迭更熱邪久而深入氣血日被損傷滋清如膠地搜逐如鱉甲煎丸無如不獨陰虧八脈氣衰如寒為熱病形漸延損怯喉痛火升上熱緩必下熱此剛藥難投柔溫之養佐通奇脈定議生鹿角霜三錢炒黑枸杞錢半茯苓錢半沙黑歸身錢半熟地炭三錢生沙苑一錢瘕泄下冷熱升議通攝任督之散越鹿角霜三錢熟地炭五錢補骨脂鹽水先煎百沸八分敗龜板刮光炙脫研三錢雲茯苓錢半石殼建蓮連殼勿研十粒經先期三日熱多寒少脈左弦大血分偏熱治厥陰瘧邪窒在血生鱉甲冬桑葉青蒿梗炒桃仁炒丹皮川貝母瘧乃暑濕客邪血證逢時便從已是陰虧體質治邪須顧本元議與竹葉地黃湯竹葉知母川貝母鮮生地薄荷寒熱後診脈小弱舌白渴不欲飲痰多氣悶瘧未盡而正已虛不可過攻防其衰脫生術半夏草果仁廣皮茯苓厚朴瘡家濕瘧忌用表散蒼朮白虎加草果仁伏邪成瘧寒熱間日作汗多欲嘔中脘痞悶不飢進瀉心湯法川連黃芩杏仁枳實薑汁半夏厚朴草果脈無力寒熱夜作煩渴噁心舌黃中痞雖是伏暑為瘧然平素煩勞即屬內傷未可泥於發散消食先進瀉心湯以泄蘊熱川連淡黃芩花粉枳實薑汁炒半夏豆蔻橘紅寒熱後津傷舌上黑胎口乾不知味食不易飢大便不爽宜進滋養陰液法麥冬知母橘紅人參川石斛烏梅肉産後未滿百日下焦精血未旺遂患三瘧緣真氣內怯邪不肯外出醫藥清散攻下僅治三陰之瘧遂致魄汗淋漓乃陽氣脫散敗壞之象矣人參補骨脂炒黑茴香茯苓歸身濕盛寒戰不解成瘧濕主關節為痛邪在裡為煩總以濕熱里瘧治宜用苦辛川連黃芩杏仁薑汁半夏厚朴脈大寒熱渴飲舌漸黃氣分熱勝血弱已久恐邪漫劫津清氣熱即以和陽議用張氏玉女煎石膏竹葉心鮮生地知母生甘草生白芍伏邪留於少陰厥陰之間為三日瘧百日不愈邪傷真陰夢遺盜汗津液日枯腸燥便難養陰藥雖為有益但深沉瘧邪何以得追拔掃除議以仲景鱉甲丸三十粒早上開水送下午後進養陰通陽藥復脈湯去人參生薑加牡蠣鹿角霜邪與氣血膠凝則為瘧女病在絡自左脅漸歸於中焦木乘土位東垣謂瘧久必傷脾胃既成形象宜通惡守佐芳香乃能入絡凡食物肥膩呆滯尤在禁例所慮延及中滿人參草果陳皮木香茯苓厚朴青皮鬱金汁深秋曾診擬議此病為暑濕食瓜辛甘寒分利奈何脾陽又受辛寒之纍致濁陰聚形頻遭食復陽屬受戕凡身中脾陽宜動動則運腎陽宜藏藏則固斯為命根局方大建脾丸仲淳資生丸多以補虛通滯芳香合用取其氣通濁泄人參輔正之力得矣人參陳皮厚朴益智仁茯苓木香間日寒戰發熱渴飲此為瘧飲水結聚而心中痛脹乃病上加病不敢用湧吐之藥暫與開肺氣壅遏一方生石膏大杏仁生甘草蜜水炒麻黃脈如平人但熱不寒煩渴身疼時嘔此溫瘧也仲景有桂枝白虎湯一法一劑知二劑已也桂枝白虎湯
