body:
  text: 卷下女科女科首重調經只因見嗽見熱但以肺藥清涼希冀嗽緩無如胃口反傷腹痛便溏惡食嘔逆此寒熱乃營衛欹斜明矣病系憂鬱成勞情志內傷故藥不奏功議戊己湯人參炒白芍鮮芡實茯苓炙甘草炒扁豆去皮向來經水調和自上年冬季每月經轉兩次天柱脊椎即酸垂心中嘈雜忽痛頭面烘熱脊背指足常冷經期落後四五十日此屬八脈不和皆肝腎脂液暗傷養液熄風冀其奇充經調清阿膠鹿角膠枸杞子當歸身生地黃元武膠桂圓肉白芍藥天門冬白茯苓烏骨雄雞去毛骨頭足腸雜青蒿汁酒醋加水煮汁收膠以膠為丸淡鹽湯送下每日四錢經阻三月咳嗽失血交夜蒸蒸發熱脈來左搏而促是陽氣煩蒸攻逆諸絡血液不得彙集衝脈深秋經水不來必加寒熱瘦削成乾血癆矣鱉甲全歸丹皮山楂生地白芍茺蔚麥冬久病形神日消脈象堅大是謂脈無胃氣矣曾於上年夏季便瀉腹痛食減舒肝健脾疏補春進安胃丸此生氣不至當女子天癸將通之歲經脈氣機怫逆久鬱熱蒸漸為枯涸之象最足慮也議用汪石山郁勞治法川芎白芍湖蓮肉青蒿當歸熟地南楂肉香附病起左肢痛痿即靈樞云意傷憂愁則肢廢也蓋肝臟多氣多血氣勝則熱血不營養經脈陽明日空血海無貯經事遂閉內風挾陽上升眩暈咳出痰沫冬令天地閉藏病不致凶萬花暢茂有增劇之慮議鎮肝安胃法用麥甘大棗湯麥以鎮逆棗甘益虛遵內經肝苦急急食甘以緩之也甘麥大棗湯氣鬱滯則血不行當理血中之氣四物湯加香附楂炭益母草脈滯經澀食入脘痞都因情懷失和肝脾鬱結使然香附廣皮蔻仁丹皮楂炭茯苓神麯鉤藤停經已九月少腹重墜而痛及診少陰脈澀小並非妊象衝任虛餒怕其暴崩八珍湯加砂仁晝夜腹痛泄氣則緩夜臥捫之常高突有形橫處其間為肝鬱不舒致沖任二脈乏氣流行經期不來營衛阻閉為寒熱互作因泄瀉已久風木久乘中土峻攻非宜川楝子當歸身青木香山楂龍膽草小茴香炒橘核青蔥泄瀉食減經水不來而寒熱咳嗽日無間斷據説嗔怒病來其象已是勞怯郁勞經閉最為難治之症人參蒸冬朮炙草茯苓廣皮白芍郁損經停膹脹難便歸身川楝子茺蔚子小茴生白芍澤蘭經水不來是絡脈無血古云氣旺血自生大忌通瘀人參當歸麋角膠茯苓桂心羊肉膠天癸從未至肉瘦色瘁咳嗆著枕更甚暮夜內外皆熱天明汗出熱減痰出或稠或稀咽中總不爽利此先天最薄真陰不旺勿攻針黹務安間怡悅俾經來可以熱除不然世稱乾血勞矣復脈湯去麻仁兩三月經水不來少腹痛脹下墜寒疝屬虛可與當歸生薑羊肉湯經閉淋瀝初柏仁肉蓯蓉女貞子郁李仁當歸川石斛肝風逆經閉淋瀝便艱復柏子仁當歸身川石斛女貞子郁李仁黑穭豆淡蓯蓉肝痹脹至心下腹大經閉二便澀少初橘葉青皮銀柴胡茯苓皮青蔥楂肉五靈脂大腹皮血結為瘕腹脹大如缶進疏肝通瘀稍安續進針砂丸以緩攻之此勞怯是悒鬱內損陽土為陰木乘侮衝脈乏血經閉肉瘦氣脹減食便溏五液日枯陰不上承喉舌乾涸仍不嗜湯飲內經謂二陽之病發心脾風消息賁皆是久損傳變見萌人參烏梅肉南楂肉茯苓白芍老蘇梗陰癇脈遲經水二月一至六味加阿膠白芍經來潮潮澀少湯飲入脘噯吐平昔善吐涎沫心搖震惕厥陰陽明皆逆龍薈丸主之龍薈丸每服二錢經來澀少便瀉汗出因驚恐致病由肝傳脾用戊己湯風動液虧腹痛腸紅經閉暮熱驚恐治在腎肝熟地炭萸肉炭炙草五味子白茯神白芍自八月中經止即食入嘔吐醫認懷娠惡阻治延至小寒節頭巔痛心中熱吐清涎濁沫水藥仍受粒米食物下咽即吐欲寐灑然驚惕肌表及足寒晡刻頭面熱腹脹心腹皆痛初病嗔怒而來確是肝木犯胃最怕暴厥急至金鈴子黑山梔炒半夏生薑汁延胡索炒香豉茯苓經水兩月不來腹形脹大有形攻觸目瞑將寐先欲厥冷後漸熱多汗此皆郁損成蠱之象當歸鬚茺蔚子五靈脂小茴香小香附炒楂肉嗽急心腹堅脹入夜氣衝欲坐下部已冷久有瘕聚問月事不來三年此濁氣飲壅塞以致血脈不通為絡脈之脹桂枝淡薑五味子茯苓白朮北細辛暴崩癖聚腹脹經水不來五月絡虛所致蔥白丸紅棗蘄艾煎湯送下動怒血吐成升月餘再吐自述少腹常痛夜必身熱汗出必經水得通可免乾血勞怯醋炙鱉甲胡黃連炒焦延胡炒桃仁茺蔚子炒楂肉脈數經遲面起痱疹肝陽內風沖逆上升胃減少食清阿膠炙甘草柏子仁小生地白茯神火麻仁左肢麻木經遲宿痗中年從未生育脈數怒則腹脹和肝胃之陽即調經要領生地當歸砂仁鹽水炒炒楂仁穭豆皮香附知母胃痛四年因鬱怒而起經落不調瘕聚腹脹欲嘔便瀉久病入絡兼理血分金鈴子肉桃仁五靈脂炒延胡索生蒲黃生香附質偏於熱陰液易虧女人肝為先天月事雖準而少里乏儲蓄無以交會衝脈此從不孕育之由也凡生氣及陰血皆根於陽陽浮為熱陰弱不主戀陽脊背常痛當從督任脈治元武版桑螵蛸當歸身細子芩鹿胎枸杞子桂圓肉經來綿綿不止恐延淋帶此後遇裡急為陰弱不內守治熟地炭芡實艾炭茯神湖蓮炒歸身脈數下焦冷經淋不止少腹腰臂痛火升面熱枸杞子生杜仲生地炒蒺藜川石斛女貞臟屬陰陰虧內熱自起陽搏動則經多如崩帶下綿綿治宜堅固其陰熟地牡蠣秦皮樗皮艾阿膠黃柏白芍茯苓羊肉膠丸五十歲天癸當絶而反多於昔沖任之脈不固已屬下焦主病脈不束骨痛無定所與三氣客痹迥異群藥未嘗及下胃傷肝垂嘔吐問病人口味苦氣塞必噦必如懸旌當以胃虛客氣攻逆議用旋覆代赭湯人參炒黑川椒烏梅肉茯苓釘頭代赭生白芍冬溫失藏肝木反泄陽明脈虛血海不按期而經下乃體不足用太過之象法當辛酸甘緩兩和肝之陰陽而苦降走泄不但妨胃且助劫耗炙甘草枸杞子柏子仁生白芍桂圓肉茯苓暴崩去血過多絡中空虛浮陽夾內風以動心悸筋脈痿軟奇經已乏每經來必病最難調治炒熟地阿膠女貞子湖蓮肉白芍旱蓮草郁悖陽升八脈不和下少因攝有暴崩之纍枸杞鹿角霜小茴醋艾茯苓沙苑淡蓯蓉當歸香附益母草丸久漏成崩上有瘍症用藥極難仿內經七方之一固下漏少佐清上醋炙螵蛸茜草煎好濾清加黃芩阿膠煎數十沸取清服經漏已三年淋漓帶下黃白視色脈不受溫暖固下湯散力量難以直達沖任古局方中有震靈丹每早服六十粒是固奇脈藥欲求全愈非大劑人參不可室女經初至必然畏熱因熱求涼致傷沖任經漏不已血色漸紫腹中痛得按略緩是從前經至失調之故和血脈之中必佐通陰中之陽杞子沙苑鹿角霜人參當歸小茴紫石英桂心十四歲室女無溫補熱藥之例視色奪脈弱下焦未寒先冷經事淋漓是衝任二氣不交冬宜藏陽用溫補升陽鹿角霜杞子當歸人參蛇床子麋茸沙苑小茴紫石英血瘀自下為順但形神頓減明是積勞已傷血脫必益氣否則有復瘀之慮補中益氣湯經漏四十餘日色黯瘀腐成塊病中動怒遂胸膈脹悶且痛瘀下稍寬醫治漏血投地芍歸膠下焦先未得其益上焦先受其滯宗經義先理其上老蘇梗南山楂桃仁香附汁麥芽延胡久崩淋帶少腹結癜液涸氣墜二便皆阻辛甘補方冀得宣通勿謂崩症徒以澀藥柏子霜淡蓯蓉郁李仁當歸身枸杞子葵子經漏腹脹臟陰為病濁攻脾胃為嘔逆人參淡附子茯苓蒸術淡乾薑長齋有年脾胃久虛瘧由四末必犯中焦血海隸乎陽明苦味辛散皆傷胃系雖天癸久絶病邪藥味擾動血絡是為暴崩欲脫閲醫童便阿膠味鹹滑潤大便溏瀉豈宜潤下即熟地五味補斂陰液咽湯停脘頃欲吐盡滋膩酸濁之物下焦未得其益脘中先以受其戕議以仲景理中湯血脫有益氣之治坤土陽和旋轉希圖中流砥柱倘得知味納穀是為轉機重證之尤勿得忽視人參炒焦於朮炮薑炭茯苓炙黑甘草十年不孕奇脈大傷經來如崩周身筋掣自腦後痛連腰膂食少腹脹乾嘔氣衝小溲如淋窒痛蓋奇經諸脈隸於肝腎恆多腎失納肝失藏脈絡氣血消乏何以束骨充形此病之最延綿難卻也閲古人法中藏真宜固脈絡宜通非偏寒偏熱之治鹿角霜當歸身柏子仁川桂枝小茴香真茯神交節令血下成塊腰痛溺淋乃下元虛八脈無氣最多反復議升陽固脈法人參鹿茸補骨脂當歸鹿角霜茯苓入土旺用事食減噁心淋帶反多老年陽氣漸泄下墜議東垣升陽法人參熟術炙草當歸羌活防風獨活廣皮經阻兩月脈象虛數嘔吐清水仍以惡阻調治竹茹半夏廣皮生薑茯苓厚朴凡交三月胎殞是肝陰內怯任脈不司擔任今見症脊椎尻垂腰痠痿弱肝腎奇經虛不固攝議用孫真人法阿膠當歸生地寄生艾炭白芍子芩砂仁女科胎前以立基為要惡阻嘔吐味酸是熱化宜安胃調氣人參半夏竹茹茯苓生薑培土安胎人參焦術建蓮茯苓廣皮砂仁氣塞乾噦不欲進谷懷妊四月腹大如足月足跗浮腫得血下洞泄而來詢知兩月前已不納立秋交節血乃暴下為陽明胃虛滯氣逆攻血海隸乎陽明致有淋漓之狀法當清熱安中以暴脹常多熱證耳生白芍烏梅肉蘇梗參湯另進子黃芩知母川連脈左右弦身麻肢冷脘中脹悶不飢吞酸由中虛肝氣內動之故五六月當脾胃司胎又體質不受苦寒非清火破泄氣分之治所宜人參枳殼生薑汁半夏桔梗厥陰之陽上衝嘔逆腹痛防胎上攻以苦寒清泄法川連黃芩川楝肉青皮白芍鬱金胎氣日長諸經氣機不行略進水穀之物變化水濕不肯從膀胱而下橫漬肌膚為腫逆奔射肺咳嗽氣衝夜不得臥陰陽不分二便不爽延綿經月藥難治效當刺太陽穴使其氣通坐其安産桂枝五味牡蠣杏仁茯苓淡薑澤瀉臨月用清熱理氣蘇梗苓皮知母白芍砂仁腹皮黃芩懷妊若患時症古人主在保胎今喜暖惡寒升則厥痛墜欲便腰腹繞痛大慮胎墜辛香溫柔之品冀其止厥鹿角霜沙苑枸杞小茴淡蓯蓉茯苓柏仁當歸暑濕阻氣胎熱由下而升兩熱相搏咽喉欲痹寒戰周身諸脈震動防胎下墜治宜清上竹葉枇杷葉知母連翹鬱金川貝胎孕而患時瘧古人先保産佐以治病茲診唇燥舌白嘔悶自利乃夏令伏邪至秋深而發非柴胡枳實之屬可止嘔吐黑水腹痛胎氣不動邪熱深陷入里蒸迫臟腑是凶危之象黃芩黃柏川貝黃連秦皮寒少熱多即先厥後熱之謂熱甚胎攻衝心而痛蓋胎在衝脈瘧邪由四末漸歸胃系衝脈屬陽明胃脈管轄上嘔青黑涎沫胎受邪迫上衝攻心總是熱邪無由而發泄內陷不已勢必墮胎且協熱自利外邪從里而出有不死不休之戒方書保胎必因陰益氣今熱熾壅塞參膠歸地反為熱邪樹幟矣前以絶苦無寒取其急過上焦陽明胃與厥陰兩治今用酸苦泄兩經之邪熱外以井泥護胎川連烏梅肉黃芩草決明川椒石蓮肉白芍苦辛酸清泄陽明厥陰邪熱兼外護胎法病勢減十之二三視舌黑芒刺舌心干板而心中痛不已此皆熱邪內迫陽精陰液告涸兩日前慮其陷伏閉塞今又怕液涸昏痙最難調治夫護胎存陰清熱去邪兩不可少川連鮮生地知母阿膠雞子黃始於嗔怒動肝冬季溫暖少藏肝氣多升肺氣不降遂令咳逆喘促熱鬱入里耳聾自利延綿經月真損必然殞胎非輕小之恙黃芩蔞皮杏仁白芍橘皮烏梅午後診脈問及踢傷胎漏用兩補氣血安胎人參炒當歸炙草炒砂仁末茯苓炒白芍廣皮痛由背繞肋脹至胃脘停住不移妊交六月陽明司胎陽升氣阻於絡斯為痛脹宿恙當春半而發脈弦搏鼓指胃為陽腑和陽以苦味之流行仍佐宣利氣分郁遏為治金石斛鮮竹茹黑山梔老蘇梗化州橘紅香附汁小産後勞動嗔怒陡然血崩乃身中陽動陰弱失守之證用藥氣味最忌辛溫走泄無有不向安者緣辛香溫熱胃中不安致嘔逆頻頻神復欲憒皆血下而陰虧為病嘔多則陽氣再傷耳古人上下變病當治其中此安胃第一要旨以胃為臟腑之大源能納穀斯後天生氣再振何容縷縷經營乎人參小麥茯神烏梅木瓜白芍鎮補肝胃既得進谷閲來教仍是陰弱陽浮姑擬補攝足三陰臟必得小效人參炙黑甘草山藥芡實熟地炭茯神起病由於小産後是衝任脈虛所致溫養攝納最為近理病根在下致脹乃耆朮升柴守而兼升濁僭上行炒焦腎氣丸可以常進但不能入奇脈耳更議法以輔其不及可也鹿茸補骨脂人參大茴香鹿角霜歸身蓯蓉蘄艾煎湯代水小産後血下暴崩汗淋昏冒寐則夢與人爭鬥此臟血大走肝魂易越補方必兼斂攝血崩久淋帶致沖任脈絡不固不但不得孕育更延痛疾耳人參龍齒炒歸身炒枸杞炙草茯神炒棗仁五味子小産後經年淋漓旬日帶下綿綿不斷骨節痿軟經臨筋脈牽掣骨熱如蒸皆沖任受傷久而不復五液皆枯日就損怯一途所幸胃氣尚存按候調攝經年冀可血氣充復四物湯加胡黃連炒黃柏驚恐起病由怒而發是為肝厥陽氣暴升痰隨氣上神識乃迷近加小産後必須養肝陰佐入涼肝生地柏仁丹參天冬阿膠茯神白芍人中白小産後汗多寒熱龍骨白芍南棗牡蠣炙草小産後經月泄瀉腹痛下血不止乾咳嗆逆乃氣血兩虛當以建中法歸耆建中去薑半産後沖任虛瘕聚少腹痛胃痛形寒身疼桂枝加桂當歸茯苓去薑半産後失血咳逆不得臥小青龍法半産後咳逆不得臥腹膨腎氣丸一兩用沙囊懸起煎湯早上服蓐勞下損咳逆不得臥烏骨雞丸遇勞氣泄胎墜胎去下焦先空足冷腰脊皆病陰陽兩損但以溫養之補懷孕即止人參沙苑歸身肉桂雄羊內腎茯神麋茸白芍酒炒枸杞共為丸産後驟脫參附急救是脫陽固氣方法但損在陰分其頭痛汗出煩渴乃陽氣上冒凡開泄則傷陽辛熱則傷陰皆非新産鬱冒之治細生地黑楂肉牡蠣真阿膠茺蔚子惡露衝心防其昏厥澤蘭楂炭香附川貝童便茺蔚延胡廣皮通草新産陰氣下泄陽氣上冒日晡至戌亥陽明胃衰厥陰肝橫肝血無藏氣衝擾膈致心下格拒氣干膻中神識昏譫若惡露衝心則死焉有天明再醒之理回生丹酸苦直達下焦血分用之不應諒非瘀痹想初由汗淋發熱凡外感風寒理從外解此熱熾神亂即仲景之新産鬱冒也倘失治必四肢牽掣如驚如風癇立危殆議從亡陽汗出譫語例用救逆法龍骨桂枝南棗牡蠣炙草小麥濁氣上逆噁心不食冷汗煩躁最防暴脫不可但執惡露滯滿而專泄氣攻血人參乾薑澤蘭附子童便産後血去陰傷肝腎先虧致奇經諸絡不至內固陰既不守陽泄為汗多驚多恐神氣欲撤此攝陰固液而有形豈易速旺古人必曰封固曰鎮納皆為此而設人參桂枝龍骨炙草附子煨薑牡蠣蜀漆産後陰損下虛孤陽泄越汗出驚悸百脈少氣肢體痿廢易飢消穀陽常動爍陰不內守五液日枯喉舌乾涸理進血肉有情交陰陽和氣血乃損症至治羊肉五味紫衣胡桃當歸牡蠣産後汗大出目瞑神昏此為鬱冒欲脫大危之象勉擬鎮固補虛一法生龍骨桂枝人參生杜蠣炙草歸身生羊肉煎湯産後蓐勞厥陽逆行頭痛昏暈身熱生龍骨生白芍炙甘草當歸生牡蠣桂枝木大棗肉羊肉産後將半月頭汗耳聾便瀉不食陰分大虛陽氣上冒防其痙厥不可忽視熟地炭炒當歸炮薑茯神炒白芍炙草産後十七朝因惱怒陽升為鬱冒寒熱如瘧經半月不止乃陰傷於下陽潛於上肝膽之邪肆行無制故乍寒乍熱不得息也擬進甘緩法使陰氣稍復寒熱可緩復脈湯去薑加甘蔗汁鬱冒汗出血下液虧人參龍骨棗仁熟地五味茯神産後真陰下虛真氣不主收納咳逆汗泄肉腠刺痛未至半月惡露已盡大便不實斷非清潤治嗽可療此攝固斂液一定治法熟地山藥枸杞五味建蓮芡實産後下虛腹中刺痛雖因惡露未盡而起然病經五十日未可專以逐瘀為主當歸生薑羊肉湯頻産脈絡已空胎前已見帶下痛甚不隨利減奇經氣撒不攝仲景建中之議取意在脾營為上中法而藥力原不及下焦也腎氣湯乃收攝陰中之陽産後營虛不耐桂附之猛烈當年先哲每炒炭煎服亦如劉河間濁藥輕投蓋湯散飲子不同法程耳熟地四錢山藥二錢丹皮錢半附子一錢車前一錢萸肉二錢茯苓三錢澤瀉錢半肉桂一錢牛膝一錢各炒炭急火煎服産後幾五十日下利滑膩痞悶嘔逆此陽結於上陰撤於下仿仲景獨治陽明法人參赤石脂五味子茯神炮薑炭炒黃米産後去血過多陰傷陽損致畏冷倏熱急宜溫養營氣勿雜治也人參歸身桂心桂圓茯神炒芍炙草枸杞産後五十日暮熱汗出身動氣喘帶下綿綿不斷腰脊痠軟牽痛此肝腎液虧沖任空乏法當通補下焦久延怕成蓐勞淡蓯蓉炒杞子當歸身紫石英白茯苓生牡仲炒白芍五味子陰虛潮熱在産後肝腎本虛始誤於逐瘀泄氣鎮補稍安再誤延胡枳實攻逐腹中刺痛營傷何疑人參秋石拌烘生地炙草茯神阿膠白芍産後下損治嗽肺藥是上焦藥藥不對症先傷脾胃此食減腹膨胕腫所由來也人參沙苑杜仲茯神螵蛸枸杞産後去血陰傷骨熱大凡實火可用清涼虛熱宜用溫補藥取味甘氣溫溫養氣血令其復元況産傷之損蓐勞病根全在肝腎延及奇經豈泛然雜治所宜人參杞子蓯蓉紫石英河車當歸胡桃茯神産後形肉日瘦經水逾期此屬內損問經來無痛與方書氣滯經遲迥異養肝沖任可矣當歸生地柏子仁丹參白芍杞子茯神桂枝烏骨雞丸蓐勞自春入秋肌肉消色痿黃外象漸寒心腹最熱臟陰損不肯復形空氣聚非有物積滯也人參生菟絲子炒當歸茯苓煨木香小茴香眉心痛心中熱腰脊痠痛五心皆熱自産後半載肉消減食乃下焦陰液大耗而肝風挾陽震動矣病自內損服藥無益閲醫雖曰養陰半投芎柴不知何意生地炙草阿膠羚羊角汁麥冬白芍麻仁産後發熱後陰虛為多陰不內守陽外泄為汗出自秋徂冬形肉消爍人參炙草炒芍五味炮薑茯神甘溫佐以酸收陰陽有漸交之機熱緩加谷可謂明驗然産後損傷古人遠剛取柔使有情生氣日泰理體可以卻病人參熟地河車膠歸身五味子産後內虛復感冬溫遂寒戰後汗出乃厥陰如瘧非輕症也炒生地炙甘草阿膠炒麥冬炒白芍麻仁蓐損當夏發泄惡風畏冷便溏汗出法宜養營人參冬朮桂心五味子炒白芍茯神廣皮炙草全當歸蓐勞下損損及八脈醫投清內熱滋陰致胃傷食減寒熱下元沖氣上逆咳嘔而咳嗽藥治肺與內虛下損益無干涉帶淋骨熱髓竭液枯蓐損較平常損怯更難寒暑更遷不復草木焉能奏功免與血肉有情望其加谷可得悠久紫河車洗潔一具人乳八兩生紫石英一斤捶碎血餘炭二兩秋石一兩同煎河水熬膏人參湯服二錢産後自乳陰傷即是亡血虛象陡然驚恐內動肝腎脊椎尾閭骨凸肌癟自臟陰損及奇脈矣先冷後熱厥冷見症良由骨枯髓竭草根樹皮何能濟事常用人乳熱飲日二三次産後失調蓐勞下損必映奇經心腹痛寒熱脊酸腰痿形肌消爍殆盡若縷縷而治即是夯極凡病宜通補而能通能入奇經人參炒黑枸杞炒黑小茴麋茸炒蒺藜當歸身蓐勞下損久則延及三焦不獨八脈晨瀉嘔食心熱下冷吸短脹痛焉有寒涼止嗽清熱之理扶得胃口安穀月事仍來方得回春異功散加南棗脈數左甚沖氣上咳吐血嘈雜如抓常有眩暈喘促此産後失調腎肝內損若不斷乳靜養春未夏初必致受纍熟地炭炒山藥炒枸杞五味子建蓮肉白茯神形冷驚怕旬日經淋漏注心怔悸如懸旌自七八年産後致病夫肝主驚腎主恐産後先虛在下奇脈不為固束急急溫補固攝仍佐通藥其力可到八脈紫石英炒枸杞人參麋茸烏鰂骨沙苑茯苓衝任內損經淡日遲形神漸漸瘦痿猶是産後不復先議溫通八脈一法當歸身鹿角霜紫石英小茴香淡蓯蓉茯苓産後下虛血病為多今脘中痞脹減食不運全是氣分之病但調氣寬中勿動下焦為穩生香附桔梗神麯蘇梗蔻仁茯苓産後病起下焦為多今右偏頭痛得暖為甚納食則脘腹加痛必瀉則已夫痛隨利減已顯濕鬱氣阻熱自濕升恆有是證從脾胃門調治生於術紫厚朴煨木香嫩香梗茯苓皮小茵陳新會皮香附汁産後腹痛脈數足不能伸瘀留入絡結為小腹癰矣失笑散加桃仁歸尾醋炒蓬朮死胎至旬日乃下必有尸濁穢氣留著沖任脈中至今黃白帶淋自腰以下冷大便久溏産後剛劑難進議用朱南陽方法豭鼠糞湯女科肝病為多産後必病及八脈即如少腹聚瘕瘕氣攻心下必嘔吐上泛則咽喉閉塞經水半年不來越日必有寒熱凡下焦多屬血病瘕屬氣聚癥為血病病在衝脈陰維陽維混混醫藥烏得入於奇脈乎地鱉蟲川楝肉鱉甲桃仁麝香延胡索楂肉蓬朮卒然心痛寒熱恰在産後即內經所謂陽維為病苦寒熱陰維為病苦心痛維主一身之綱維其陽行衛其陰行營二脈致偏不飢少納腹脹瘕聚泄瀉夏月經必先期秋冬下焦常冷鹿角霜當歸生杜仲芡實白茯苓沙苑小茴淡蓯蓉湖蓮炒黑艾紫石英醋炒紅棗肉為丸又去艾加河車膠脘痛映脊甚則四肢逆冷問當年産後瘕泄今帶淋經漏脊椎酸垂內經云陰維為病苦心痛維脈陰傷異治非破氣降氣能療鹿茸枸杞子當歸沙苑鹿角霜肉蓯蓉小茴茯苓産後癥瘕蔥白丸每服二錢艾棗湯送下産後堅痛少腹症桂心當歸白芍茯苓紫石英小茴香附羊肉膠丸背痛徹心帶證多下兼有氣逆衝心周身寒栗乃衝任脈虛損病從産後來歸身炙草桂心白芍杞子茯苓肝脾不和少腹脹足浮腫帶下因於産後未復大腹皮當歸身茺蔚子柏子仁茯苓皮小茴香小香附胎前水溢浮腫喘滿不得臥開太陽獲效即産浮腫自然漸退女科不明産後下虛多以破氣寬脹百日來腹大且滿按之則痛此皆氣散瀰漫為難治之症議用炒枯腎氣丸兼調琥珀末以調其血冬至一陽初復驟有肢麻火升其失藏已屬下虎月餘值黃昏氣塞心痛喘逆戌亥陰時沖逆下起肝臟厥逆直將犯上至於坐不得臥直至産後下虛更極水穀溫氣未能循腑分流旁漬滲入經脈從前厥逆肝氣肝風由然沸騰搏激似湍水東西可使過顙之喻究竟病根全在平昔抑鬱內經驚恐明指肝腎今既失司腑氣不主宣化至陰之臟調之非易議以專走足太陽表中之裡冀陰陽漸分經旨謂太陽司開立法薏苡仁淡乾薑茯苓塊大杏仁五味子生白芍此水氣結聚壅遏經隧致呼吸有阻為噫氣而其聲在咽䁩況任脈行乎身前母子經行必關衝任今氣痹水蓄血亦化水為腫脹胸高腹大水性就下搏激可使過顙下竅久閉狀如甕曷不效禹治水之功徒執寒熱補瀉為法宜乎久藥無功也十棗丸經水不來先天素弱因多郁嗔怒肝木疏泄水飲旁漬而腫脹最為難治米仁牡蠣防己茯苓澤瀉萆薢多産五液走泄殆盡年已六旬反患淋漓帶下大便日見枯澀少腹形膨䐜脹血液既去氣散不收行氣破氣是速其凶矣炒焦腎氣湯腰痛如束腹膨欲脹八脈為病鹿角小茴茯苓杜仲當歸本質最虛多憂積鬱春深入夏陽氣發泄脾弱失運納穀漸減土中陽漸濕生氣鈍肝木來克腫脹日著血敗化水凝結小便日加短澀濕墜注腸大便鶩溏陽氣不交於下膝下寒冷不溫脈澀經閉顯然血蠱濁氣上干必有喘急夜坐不臥見症險篤已極勿得小視以通陽腑理虛冀陰濁不致閉錮人參淡乾薑茯苓淡附子豬膽汁澤瀉動怒忽心腹痛有形此氣聚成瘕乃肝虛氣逆用辛補體用方人參炙草當歸川楝子皮茯神白芍桃仁肝失疏泄二便不利少腹素有瘕症氣逆為厥治以辛潤當歸蔥管柏子仁小茴桃仁茯苓冬季腹大大便不實以通陽泄濁初用相投久則不應久寡獨陰無陽郁慮至少腹結症其病在肝五旬外正氣日衰邪不可峻攻矣六味加小茴香川楝子水泛為丸沖任脈虛帶下少腹瘕聚肢麻歸身桑葉牡蠣茺蔚子茯神建蓮少腹瘕聚攻痛淋澀不止蔥白丸艾棗湯送下肝陽上升陰失內守心痛火升帶下生地炭天冬杜仲歸身女貞子茯神川斛柏仁八脈空虛衝陽上逆上熱下冷肉瞤筋惕帶下變色晨必瘕泄非滋清陰潤所宜桑螵蛸生杜仲湖蓮菟絲子沙蒺藜茯苓食少便溏帶下人參生術小茴鹿角霜杜仲茯苓炮薑炒當歸桑螵蛸艾炭紅棗肉為丸脘中氣通帶下赤白此平素血虛近日時氣復傷其陽六脈無力下滑不禁為病臥久非堵塞可愈仿東垣固真寄升降方法人參生乾薑柴胡郁李仁廣皮炙甘草黃芩白葵子脈數盜汗心嘈咳嗽腹痛便溏形體日瘦小溲淋痛此肝腎真陰大虛欲為勞怯不可輕視熟地芡實炙草女貞子五味山藥茯神陰虛淋閉未減近日腹痛吐瀉喜得冷飲必有暑濕內著太陰脾臟與本病兩途先宜分消調中俟痛瀉平再議黃芩益智仁黑山楂白芍陳皮白木瓜下焦熱甚陰陽氣泄腹痛未止與和中堅陰法熟地炒歸身黃柏炒楂炒白芍萆薢驚憂惱怒肝失其用遂成淋閉當歸身柏仁車前郁李仁牛膝黃柏寡居少歡悅之念肝膽中郁悖氣火直上直下莫能制伏失其疏泄之用小溲成淋以厥陰肝脈環繞陰器議進龍膽瀉肝湯鬼神亡靈皆屬陰魅寡後獨陰無陽病起驚恐必腎肝致臟損所致經水仍至以寧攝神魂定議韓祗和法當歸身羊肉龍骨肉桂心生薑牡蠣任督失司脂液暗消八味丸可以常服再議固奇脈方法以佐之人參菟絲子覆盆鹿茸鎖陽骨脂産後厥證下虛為多怕風寒面腫肌肉如蟲行腹瀉肢縱此方虛風議和八脈枸杞小茴鹿角霜菟絲子杜仲當歸沙苑茯苓薑棗湯泛丸脈沉懷妊八月久咳皆冷沖逆不得臥此因抑鬱陽失轉旋濁凝飲結當治飲不治咳桂枝淡薑白芍茯苓五味色脈無神虛煩久咳寒熱不止因悲哀驚恐病勢反加胃氣漸減大便不實月事過期不至恐有下損及中之慮擬建中法人參白芍桂枝茯神黃耆炙草牡蠣南棗脈細弱形寒久嗽寒熱頻來易於驚恐經來色淡且少不耐煩勞此陰陽內損營衛造偏仲景凡元氣有傷當與甘藥知清涼治嗽等法非醇正之道黃耆建中湯去薑虛損久嗽失血晝寒暮熱經閉食減大便不實當交春病增少陽生氣不至春半後肝木大旺其能久乎炒生地阿膠炙甘草蓮肉炒麥冬茯神生白芍又人參芡實生地炭茯神蓮肉川石斛悒鬱內損經阻筋骨皆痛損傷不復即是勞怯溫養流通望其鬱痹氣血融和但以清熱見血理嗽治百無一活當歸生鹿角桑寄生枸杞生杜仲寡居菀勞系乎情志損傷草木難以奏功因近日火升下寒暫進加味貞元飲制龍相之陡起熟地白芍青鉛牛膝炭茯苓虛體驚恐遂成癇厥議鎮肝熄風養陰平陽法生龍骨生地生白芍生牡蠣阿膠烏梅肉血液已空肝風翻越産後大虛之體厥逆昏冒皆是肝陰欲絶陽氣夾內風上蒙清竅昨議鎮肝熄風旦日頗安暮夜再厥陰氣枯稿已露最難調攝何疑制首烏天冬生地黑穭豆皮茯苓川斛肝風陽氣升於清空咽喉阻痹心似懸旌緣春半地氣上加産後下虛藏納未固隨時令而越議用鎮陽守陰方龍骨阿膠生白芍牡蠣雞子黃米醋又人參小麥生白芍阿膠茯神川楝肉又淡天冬陳阿膠制首烏茯神黑豆皮生白芍脈澀數上盛下垂肝腎真陰下虧陽氣內風上泛舌齦欲腐跗腫進腎氣丸三日即見腸紅暮夜熱蒸晨朝汗泄大便常有溏泄淋滯諸恙當理足三陰之法仍佐固真攝下主之水制熟地女貞子茯神白芍五味子禹餘糧芡實秋石糯稻根鬚山藥粉丸脈沉右弦月經漸少而閉腫由下而上此血化為水氣壅經脈大便久瀉小便不利六腑不通從太陽開導以泄其水五苓散加厚朴調入琥珀末胃脘痛起必經漏帶淋嘔吐不納食醫者多以開泄理肝及參連薑桂治三月病幾危殆六月念四診議宗內經陰維脈病獲效秋燥冬溫氣加因咳嗽而吐血思絡空氣乘非偏寒偏熱可治女人肝為先天首重調經恪守此議為正烏骨雞膠生地女貞建蓮桂圓膏白歸身阿膠柏仁茯神膠膏為丸煩勞繼以悲哀經阻三月是二陽之病發心脾當歸川芎澤瀉白芍香附楂肉接服柏子仁丸娠八九月胎吸母液陽擾煩蒸心痛引入少腹謂之子懸失治有三沖三激之纍生地天冬柏仁阿膠女貞茯神初産益母草炒楂肉延胡索澤瀉炒麥冬黑豆皮安胎桑寄生人參石殼建蓮川斷砂仁台州青苧産後宗王損庵劫胃水法用理中湯人參焦術炒薑炙草劫胃水已應議升陰中之陽互入攝固人參炒當歸五味子茯神麋茸蓐勞久損不復舌絡牙關牽掣陰乏上承浮陽內風上熾當與靜藥養陰和陽生地天冬當歸身桂圓膏阿膠麥冬女貞子烏雞膠丸方脈數左弦右澀産後經年右肢痛楚不能步趨雖曰勞怒傷肝營陰暗虧不能涵養筋骨所致然久久陽明之脈交傷焉能束骨利機關之用肌肉漸瘦寒熱不止是足三陰交虛成損上及胃腑之象議藥當主通補但病久延根蒂已虧恐淹纏不已病日加增未敢輕談易易也羚羊角制首烏女貞子生杜仲白蒺藜大胡麻金石斛黃耆脈左弦右數五年前經漏癥瘕又復生産繼之帶下綿綿年來色奪氣短食減外寒內熱脊骨腰髀酸楚若墜時欲拊捫少安仲景謂産損諸病多從下焦肝腎起見臟陰虧損漸干陽分而沖任督帶諸奇脈受傷有形精血難以速成下焦空乏隧道迂遠雖補劑頻施不能沾及故未易取效也若暴崩暴漏溫經固澀可投今屢年帶淋脂液暗耗陰分大傷豈可溫熱剛暴再劫其陰宜從陽引陰扶之培之可耳見病治病有何益歟日久髓枯將有損不得復而成勞怯者鹿角霜蓯蓉當歸熟地沙苑杜仲小茴香茯苓症是損怯經閉診左脈濡小前用溫通湯藥心下稍舒繼用膏子柔膩便溏少腹堅硬小溲不利凡脹屬氣滯質虛斷不可強執通經議早服五苓散暮服禹餘糧丸壯水臟以分利小便是氣鬱脹閉治法白朮獵苓桂心茯苓澤瀉幼科形瘦脅中有形五心煩熱盜汗雖是童真久延疳勞使君子廣皮胡蓮楂肉砂仁白朮茯苓白芍厚朴雞肫皮久病腹膨目眶下紫是脾虛夾積即疳熱之症乾蟾丸利後陰傷五心煩熱稚年恐致疳病最宜薄味調養夏冬可與清熱肥兒丸之屬白芍胡黃連南橋山楂乾荷葉茯苓牡丹皮炒澤瀉汗後泄瀉不解非因表裡客邪初起嘔吐而瀉今噫氣尚然穢濁知平素過愛雜食屢傷脾胃兩旬不愈為幼科疳蝕瘦蒸之症乳汁甘美慮熱化痰再吐便有驚厥矣胡黃連枳實豬苓廣皮白楂肉澤瀉犀角尖白金汁鮮石菖蒲連翹心鮮生地金銀花溫邪入肺肺移熱於大腸為瀉瀉白散清其受病之源頗是但上焦氣壅熱聚氣逆則咳喘嘔吐幼年最怕有痙厥進辛寒解邪豎抱令臥勿使肺葉張舉易得安痊乃百試百中捷徑杏仁米仁荷葉梗連翹橘紅蜜炙稚年食物不節胃土受傷熱蒸於裡肝膽木火化風遂成癇厥口喎肢牽皆風火燥及絡脈若仍亂食厥逆不止有五癇不治沉疴川連膽星遠志枳實黑梔橘紅桔梗萊蔔子稚年形消脈小食物日少晡熱早涼汗出損勞難治幼科門內損必皮毛血肉之傷起因議調營衛黃耆歸身米糖南棗幼年冬月短氣煩悶寐中筋惕肉瞤乃因未充長陽浮則動當用六味丸加麥冬五味稚年脾胃氣弱夏秋瘧痢宜顧戀中土醫不明此理惟發散消導致元氣衰憊肝風內鼓爰成慢脾驚搐遂令無藥可挽勉議一方犀角尖白金汁鮮石菖蒲連翹心鮮生地金銀花痘科診後夜來大便三次午後看視堆沙甚薄額準諸痘枯癟少漿可見元氣日虛里毒無以領載而出今日理進攻托遲則恐其乾涸塌陷黃耆當歸殭蠶桑蟲漿防風炙草山甲木香汁次日漿有五分不肯肥飽充頂昨停涼藥寢食大物頗宜頃燈燃看視自云畏寒經云形寒飲冷為肺損蓋見肺主一身氣化氣虛性薄皮腠不營法當參耆益氣氣充漿成矣近日幼科以毒為疑慮吾謂氣壯毒化邪與正不並立也歸身人參川芎炙草黃耆官桂廣皮木香次用錢氏異功散加木香次用四漿散又首烏茯苓百合炒芍米仁沙參四朝半汗出衛疏肌肉柔嫩氣虛證也今日猶在六日前宜和血脈升頂少候形充即商內托至於保護脾胃猶不可缺川芎殭蠶紫礦廣皮當歸炙草丹皮雞頂血五朝賴有形紅潤色澤得以運行漿汁而嘔惡泄瀉脾胃氣弱已見一斑五行火能生土況肺金溫暖氣化流行如陽春布德同旨人參炙草厚朴官桂丁香木香腹皮當歸六朝清漿已有六七色頗鮮明氣血有生長之機助元正所以化毒兼理脾胃保元湯加川芎木香肉果黃米七朝漿已八分其色淡白要知氣血不足到此便顧脾胃色漸蒼黃即可回痂以杜氣弱難收之弊竇議錢氏異功意人參白朮廣皮茯苓炙草米仁八朝痘至回痂皮毛內應乎肺此音低咳嗽有自來矣古人進清涼以助結痂譬之秋令收藏萬物乃登小便頻長腑無留毒壅滯非徒為虛而呆補為也米仁苦皮百合甘草梢茯苓地骨皮淡竹葉九朝回痂嗽嗆音低痘氣由里傳及肺部氣之所至即為熱氣熏灼只因脾氣未實沉寒亦犯禁忌故小便欲長驗肺氣降也輕清涼解毋傷中也古人云疹前痘後最宜詳慎淡黃芩緑豆皮米仁甘草梢地骨皮金銀花連翹茯苓五朝痘已大發面部細粒繁冗界地不清抑且神躁不安身軟痿頓毒火時癘並重布此血熱大險之痘今日痘熱雖透所謂痘雖出毒猶在裡大劑寒涼疏利氣血使時火去神識清顴頰諸痘綻立分清界地乃是好處犀角楂肉川連連翹元參青皮羚羊丹皮紫礦大力赤芍木通四朝議用清火解毒活血疏滯痘繁乾燥乃不得起脹之象險重犀角楂肉生地連翹元參羚羊丹皮金汁土貝紫草黃連膏豬尾血膏銀花湯煎五朝兩日來大劑清解痘粒仍屬干萎可見火毒矇蔽氣血邪勝正怯何疑毒不外透徒在裡蒸搏痰侵咽嗆逆來矣總頻與清涼痘之潤澤非成漿形色至險至險議以牛黃珍珠護心包以利毒痰湯藥方法不越寒涼範圍矣川黃連犀角汁土貝丹皮金汁生地地龍汁羚羊汁連翹桔梗元參六朝三次大便竟是藥汁乃胃中谷氣已少苦寒直從下走究竟痘形干痿肢泡纍然並無毒肯解化之兆也已經洞泄其滑潤又當酌進必得胃蘇納穀希冀堆沙發臭黃連土貝羚羊角丹皮黃芩桔梗連翹紫茸七朝雖是清漿顏色呆鈍仍是郁毒尚多氣血不足宣布之象況肢腿發泡瘙癢損泄皆伏危機今日清解滋血佐以攻托務使胃蘇進谷穩過十二朝方有好意黃連生地銀花殭蠶桑蟲汁黃芩丹皮連翹紫茸銀花地丁湯煎九朝神衰困倦夜來繚舌咬牙煩不肯寐況進粥食甚是勉強猶非全好光景古云重恙必進寢食今陽火與痘毒尚亢而陰血津液暗爍清涼多進熱不盡解攻蒸兩投毒未熔化摩挨多日究無實濟因思內經云寒之不寒為無水當養其陰擬此連進三天扶過十二朝再議炒熟地茯神麥冬天門冬川斛米仁頭面有收斂之象雖曰回痂而食物不加便溲未調究竟毒未盡化正氣先怯危機仍若連進苦寒攻毒以來胃氣受藥亦致廢食凡欲自思進之物皆能醒豁脾胃之性停藥以和胃越二日再議三朝時癘毒火兼盛表裡不清煩躁神昏布痘不爽痘屬險篤幸賴年已十三能耐摧拔庶可幸成石膏大黃青皮連翹紅花方諸水黃芩桃仁泥楂肉牛蒡滑石四朝時癘毒火當蔽心包絡所以昏憒譫妄況痘子界地隱隱夾疹血熱煩蒸已極不獨治痘先須清神為要議三黃解毒湯淡芩黃柏石膏黃連滑石黑梔五朝神識頗清全賴苦降之力論年長出痘人事已曉肝中相火腎臟龍火皆得焮騰升發少陰脈循咽挾舌厥陰脈貫膈繞咽一水不能制伏恐其阻塞咽喉陽氣燔灼吐湧涎沫為膠原在難治之例矣經云火淫於內治以苦寒佐以鹹寒咸能潤下直入至陰溫邪宜潤忌燥不僅痘門通套已也川連元參黑山梔犀角方諸水川柏生地龍膽草丹皮六朝川連膏丹參犀角汁連翹生地膏元參丹皮羚羊汁土貝銀花湯煎又川連膏天冬麥冬連翹銀花元參生地川貝生草十一朝漿滿回痂毒氣已泄口唇痘子未若肌表漿痂必成熟腐而落此最動之處最易變疳明日便約疳醫洗治為要川貝生草天冬銀花麥冬元參知母連翹又天冬生首烏生黃耆銀花麥冬小胡麻地骨皮連翹又金石斛天冬生首烏連翹地骨皮麥冬金銀花山豆根十八朝虎潛丸八朝火毒即是血熱理用寒涼氣虛乃元弱不領毒外達治宜內托二症相反有如冰炭若之火毒便非氣虛今周歲嬰孩面有清漿五六背部根暈皆散八日來不思納穀反現嘔惡咬牙泄瀉渴煩等象全屬裡虛毒陷若不急保脾胃溫養氣血以運行漿汁必致延挨告變陳文中雲渴瀉嘔惡或腹脹十一味木香散主之憑理考古不敢因循苟且也九朝七味豆蔻丸研入米飲內服十朝瀉止能食最是好處但痂瘡甚薄漿汁不濃毒未化盡半月後恐有餘毒纏綿今解毒為涼藥脾胃尚弱未可驟進姑與健脾利水一二日當停藥安穀至初十間再行解毒穩熟白朮炙甘草米仁炒陳皮白茯苓炒白芍炒穀芽炒澤瀉三朝正面不焮發色猶鬱伏時氣固從熱論驗形體已屬不足刻下輕潤涼解活血六七日受補可療然症象已繁多屬險犀角紫草連翹木通滑石楂肉丹皮甘草紅花筍尖四朝正痘皆發形軟蓬鬆色嬌皮嫩是氣虛形色大著或以身夾斑點為血熱此乃時癘混入血中非本體之見端故六日前清涼活血皆解邪之法七日間助元內托乃養正之法仍以輕清議用犀角紅花紫草杏仁殭蠶羚羊丹皮甘草連翹楂肉加雞冠血五朝不肯光華形象扁塌此氣血俱餒未能領載毒氣以化漿則知寒涼解毒乃通套常方而煦提氣血方稱工巧川芎炙草殭蠶紫茸歸身楂肉角刺桔梗加雞冠血氣血寒涼太過脾胃傷則嘔澀議用異功散寒戰咬牙泄利清滑粥食不受從前寒滑重傷脾骨致毒不盡神內怯腸中滑不自持雖參術亦從滑下惟有陳氏法急固下利七味豆蔻丸脾氣初結未可解毒涼潤白朮炭建蓮山藥炙黑草薏苡仁茯苓澤瀉二朝時氣與內毒痹結喘促痘不發越宜通氣血調暢六腑石膏大黃酒炒制紅花青皮滑石楂肉桃仁木通三朝痘形八九不得均勻而形色乾燒已為火象清解涼血透毒為治犀角尖楂肉連翹丹皮生草羚羊角紫茸牛蒡桔梗四朝羚羊角元參殭蠶生地紫茸川黃連桔梗楂肉丹皮雞冠血銀花湯煎五朝火毒未化咬牙嗆咳嘔惡腹膨清解兼疏滯羚羊角楂肉殭蠶紫茸連翹川黃連廣皮土貝丹皮桔梗銀花湯煎六朝火毒未為盡透腹膨便溏不欲進食此脾正虧而腸胃中滯氣不行也議以養營托裡疏理滯氣之法川芎腹皮殭蠶厚朴當歸廣皮角針青皮八朝攻毒以來漿末鼎充再腹膨嘔逆身熱二便頗通豈云食滯口之脾胃間尚有蘊伏熱毒阻撓流行氣機脾滯為脹胃逆為嘔若不清理痘中雜病須防喘急疳鉗竹茹枳實麥冬青皮川連橘紅茯苓腹皮九朝川黃連黃芩桔梗銀花橘紅益元散連翹川貝地丁痘形色不雄偉焮發是屬氣虛議進透肌安表荊芥赤芍楂肉桔梗筍尖牛蒡紅花廣皮甘草四朝痘已發齊稠密不準額準盤松不綻諸部亦少光彩氣虛毒重八九恐生癢塌今議用升頂提透不可擅用寒涼川芎歸身紫茸殭蠶雞頂血桔梗紅花楂肉甘草酒漿五朝元虛痘密起發成漿最難今日再進提托少候形充即商內托受補為佳川芎炙草殭蠶楂肉羊肉歸身廣皮角針紫茸雞頂血六朝地閣頤頰稍稍光潤所謂行漿之色奈何天庭枯白形似蛇皮陽位不宣究非善狀急急溫補氣血從內托毒遲則變症補必無益矣人參川芎廣皮楂肉黃耆當歸炙草雞頂血七朝人參川芎當歸廣皮黃耆鹿茸炙草楂肉八朝漿有四分闊塌發癢慎之人參黃耆炙草木香歸身鹿茸坎氣廣皮肉果九朝面部清漿欲涸周身暈散塌闊咬牙泄瀉納穀不多兩日癢甚今日稍和表裡正虛毒陷欲涸再當攻發繼進木香異功散理肺安脾為要十一朝頭面半漿回痂肢體灰陷不榮虛中留毒險篤在於明後今寒戰咬牙不食則正氣欲脫擬以附子理中湯加茯苓四朝身小痘多氣虛血熱今時氣未盡尚宜疏解五日後便當補托猶宜加意可冀有成荊芥楂肉紅花桔梗冬米牛蒡殭蠶川芎丹皮五朝身小痘多元氣甚薄凡起脹灌漿全要精神待毒自發熱體少安適至七八成漿神氣已經耗損故痘書云小舟重載八九風波可見元氣日薄癢塌內外症象都在是期虛中夾毒明明險象今議用和血提頂起脹方法川芎炙草紫茸木香雞頂血當歸廣皮炒查殭蠶六朝痘雖放白已具行漿之勢所嫌頂不高聳況又咬牙大便頻下內虛之象已見一斑今急急補托使精神稍振可以送毒化漿黃耆炙草木香殭蠶歸身川芎廣皮黃米七朝色白不能紅潤大便頻下是精神內竭有下陷之象擬進參歸鹿茸湯冀其元氣稍振便可僥幸成功本方加肉果訶子皮炒廣皮木香八朝漿水不行咬牙腹痛泄瀉此正虛氣滯毒凝補托極妥慮虛不承受陳文中雲渴瀉腹脹可與木香異功散以安中疏滯人參蘇梗厚朴丁香當歸木香前胡青皮腹皮川芎加炒黃米六朝形鈍色扁是痘發毒鬱於里不肯成漿焉得毒化況內證如不食口臭下利元氣為毒拘束之象已著無對症之藥不得已以當世通行涼解實無濟也犀角紫礦殭蠶生地連翹丹皮楂肉銀花湯煎六朝肉部腫瘡枯周身形象不偉本虛氣血不行毒氣漫無拘束必得痘形充長顏色潤澤方有成漿之望議以清毒內托兩和氣血黃連歸身丹皮廣皮川芎炙草紫礦殭蠶雞頂血七朝色稍潤形尚癟血有承載之基氣少煦運之力古人每以十宣保元勃氣翁氏亦主六日後專運氣血為主今日初見漿來瘡家氣血耗損深慮兩日間癢塌人參木香川芎酒漿歸身炙草楂肉九朝人參殭蠶歸身黃耆甲末廣皮十朝漿未充盈泄瀉黏膩雖痰咳上焦未肅理必急護脾陽此陳氏方法何憚不用耶人參酒炒當歸炙草肉果黃耆酒炒白芍木香廣皮炒黃米湯煎此後十一朝方十一朝鼎不充滿皮殼已腐不任攻發惟宜補托人參焦術丁香訶子皮肉桂廣皮厚朴肉果炒黃米此前九朝方十二朝炒白芍茯苓甘草丹皮生米仁骨皮銀花澤瀉七朝音啞痰潮下利黏膩翁仲仁云喘急見於瀉後總是氣虛而斷嘔惡不食脾肺兩敗危如朝露矣陳氏異攻散溫里托毒急救太陰臟真八朝內症安和宜理陽人參丁香肉果肉桂茯苓白朮木香薑附炒黃米湯煎二朝見點隱隱不透左太陽背部紫斑雖經下過精神已憊難任蕩滌悶伏之象顯然已著即投攻發藥石恐有倒戈之慮荊芥桃仁牛蒡紫草大黃青皮防風紅花桔梗川芎滑石楂肉藍汁百日嬰兒未沾穀食胃受乳汁甘美腑氣嫩薄痘發震動里真已覺悽悽不安藥味苦劣胃中氣弱必有嘔吐泄瀉是病未攻而正反傷矣況此薄質宜乎和不可推蕩乃至理也總屬邀天幸不堪用人工者議解肌透毒乳母代食兼通乳汁生地赤芍紫茸楂肉漏蘆紅花荊芥丹皮木通通草形瘦質弱當夏至氣疾發痘汗泄肌疏暑熱傷氣五朝來形象枯癟乏光潤充偉之象蓋元氣不能運毒以化漿矣有限日期若不氣充外灌必致外剝內陷諸竅大凡治痘必須論體此虛弱扶毒之證最難調治與實火壯盛迥別議進芎歸湯和血內托以助充長川芎炙草紫茸天蟲雞頂血當歸炒查丹皮桔梗空泡遍起不肯灌漿世俗每拘氣過則泡僉用涼藥清其氣火夫不足之體焉得正氣有餘良由血不附氣為空纍耳故保元湯內托挾漿一定至理此證扶持過十二朝投得清涼解毒合乎先補後清之旨方有好音人參黃耆當歸白粳米炙草廣皮川芎麵漿七八雖曰稀清護養弗損亦可濃厚成痂但胸中身背形象損傷者難以聚漿其它僅有空殼根暈少附況兼嘔惡氣逆神煩內證未得安寧虛中夾毒又非徒補可安此益元氣血之中諒必參以清涼就翁氏論痘原叱過補十天痘疹合乎秋冬之令夏季發泄大忌攻擊以速其腐潰至囑至囑人參煨木香歸身粳米川連酒炒白芍廣皮晝靜夜煩陽亢陰虛緣稚年之體屬陽乏陰協和清涼解毒僅能理時癘火毒先天藏蓄之毒兆於有形之始豈刻時可徹論理壯水制陽益陰解憂仿仲景之議可也六味去萸加芍正在關津而陽分散漫之毒現於頭巔內虛不受芩連苦寒姑進益陰臟能陽腑勿使深入里此方逸去冬溫未解神氣未為清爽痘雖熱症體柔肌白是為元虛清寒不可太過胃無妨礙自無變症殼薄痘多看護宜慎犀角炒楂肉牛蒡子連翹羚羊丹皮制天蟲桔梗臨服入雞冠血十五滴痧疹痧不外透火鬱於肺肺脹則喘口渴頻煩熱邪在上況發厥如驚尤屬熱象辛寒解利鬱熱從內經夏至後為病暑治連翹杏仁黃芩山梔蘆根牛蒡石膏紫菀木通病在暴冷而發肌表頭面不透是外蘊為寒內伏為熱肺病主衛衛為氣分兩解為是麻黃牛蒡射干桔梗石膏杏仁生草枳殼汁暴冷外加伏熱更熾邪鬱則氣血壅遏痧疹不肯外達痰氣交阻神昏喘促漸入心包有內閉外脫之象連翹射干滑石銀花菖蒲通草又牛黃丸溫疹乃口鼻吸入穢濁之氣乃無形之邪上竅阻塞嗆物不下醫不知有形無形但曰清火寒降至藥直入腸胃與咽中毫不相干牛蒡子銀花馬勃連翹射干蘆根外科脈細數春夏間水顆如疥下焦先發延及四肢此先天遺熱伏於陰分乘天地之氣升越而發病雖漸渺除根最難蓋陰液難成易損情欲之感皆與真陰有乖也虎潛丸寢食如常自上年失血之後巔頂肌膚髮現疥瘰瘙癢春發冬瘥先以和血平調方制首烏九蒸桑葉浙菊花炒杞子三角胡麻金銀花紅棗肉和丸每三錢陽氣發泄水穀氣蒸留濕為瘍流膿之後而睪丸偏墜下焦瘡疾皆濕甚鬱熱之徵以宜行氣分健陽運濕治刺蒺藜雞子清制四兩生薏仁四兩製半夏生益智仁二兩生於術八兩白茯苓水泛丸骨骱屈伸之間疥癬經年不愈痛癢流水外治敷貼不效曲折處結核抑且頻噫乾嘔納食咽中似阻經水期至常有帶下此陽明經絡中久有濕熱浸淫既久必有蟲蝕外治清熱去濕殺蟲內服藥餌以調和氣血為主佐苦辛通其經絡使氣血流行內外兩治相合生耆皮防風生米仁白蒺藜當歸防己桔梗威靈仙大風癘疾周身皮脫如麩夜則烘烘潮熱晝起鼓栗寒戰其風毒流布營衛無地循環不到爍人氣血深入臟腑為瘍科緊要之症余非瘍科僅閲古人方書推古方醉仙散為首考其藥性藉毒驅毒慮有齒牙之傷此症發於秋甚於冬至春暖入夏則鮮相沿發非纏綿之恙非規矩準繩所能調攝者暫宗羅氏既濟解毒湯與高麗參末黃芩升麻大黃防風黃連柴胡威靈仙甘草陳酒浸一日竹籃內攤干煎服咽喉腫痛湯入咽有阻此皆鬱熱欲變喉風痹塞急急清散牛蒡元參金銀花桔梗連翹射干緑豆殼通草另用川連冰片硼砂牛黃點痛處喉痹勢緩鬱火釀痰未經全清補湯少進炒黃川貝天花粉大沙參夏枯草花鮮菊葉白通草癰瘍膿潰以來臥床氣機未暢肥甘過進胃壅生熱致口中味甜納少不飢只因津液潰散之餘原非痰凝之比辛燥滲泄都是動藥洞然忽空求助於食陽動為消也自述火升由下上巔病來迅若風雷與仲景厥陰心熱如飢恰合可見厥陽震內風生肝失和胃受擾咽乾舌枯亦是厥陰消渴此肝為主病之臟胃為受病之腑古人謂九竅不和都從胃治夫清養胃陰必先制肝陽之擾故取甘酸化陰之法人參炙甘草炒麥冬佩蘭葉木瓜生白芍烏梅肉瘍潰膩補胃陽壅遏加以暑濕熏蒸自口鼻由中道而入胃更不和嘔逆泄瀉古人謂九竅之疾都為胃病也但胃為陽腑剛燥須忌久臥床褥脾困艱運和補仍佐通泄為宜勿使氣分呆滯人參金石斛廣皮荷葉茯苓烏梅肉木瓜澤瀉潰瘍未合頻進培養反晝夜漸寒潮熱食物日減形神日損近熱甚衄血口渴舌絳肉腠麻木本虛之體夾雜暑熱慮液涸昏厥擬用復脈湯菀悖陽生血氣紊亂遂成癰瘍潰膿以來進參耆內托益氣生肌雖為正治但中上兩焦補法陽愈升騰肝木震動爍筋襲絡致有偏枯麻痹診面色油光平居大便久溏酒客虛中有濕不受甘膩溫柔議以苦降和陽佐以熄風其平時調理方法俟再斟酌金石斛陳膽星人參橘紅烏梅肉茯苓潰瘍營損不能食便瀉復閉四君子湯加當歸白芍年高表疏風毒侵入陽位盤踞閉塞隧道發為癰瘍中下兩焦受困今津竭便難無味食減內風日熾節過春半恐有病加之慮宜潤補淡蓯蓉枸杞柏仁牛膝當歸麻仁破傷失血液涸淡蓯蓉枸杞生地川石斛當歸天冬陽上冒鬱熱蒙竅桑葉雞子白海浮石蘆根沙參麥冬川貝母陰分固虛經脈有濕熱阻塞所以下焦發瘍津液不得上涵遂久咳不止幸得能食不致傷及中宮薄味靜養圖安生地干何首烏米仁黃柏麥冬三角胡麻茯苓萆薢陰損有漏瘡咳逆欲嘔炒熟地女貞山藥炙甘草白芍茯神能食形色奪肛瘍癰遺精酸苦泄熱不應當通陽攝陰蓯蓉熟地黃柏遠志茯苓鎖陽龜甲白芍羊肉膠丸督虛腰背痛神倦有痔下血早服斑龍丸加五味晚服歸芍異功水泛丸陰傷濕熱下墜肛痔溺澀精濁生地黃柏川斛炒黑槐米丹皮知母澤瀉金銀花瘰癧不消伏邪寒熱海石生牡蠣黃芩橘紅小生地蛤粉夏枯草土貝銀花丹皮水泛丸癘勞寒熱食減參歸耆建中湯去糖加茯苓病起北方冬月始於腰間膚膜凝形既經消散凡靜坐良久若皮裡膜外中有牽絆不和之狀想凝著之寒必入營分血絡之中由此壯年不愈氣血日薄有癰瘍纍瘁矣麝香全蠍川烏頭乳香地龍沒藥脈得左搏大右緩夏秋熱氣從口鼻入由膜原以分布脈絡是時水穀腥膩助熱聚濕經謂濕勝則腫熱爍為痛所患右脈及左甚病久邪深入於血分矣經云陽明之脈束筋骨以利機關今躁痛夜劇便祕不爽且有渴飲古稱九竅不和都屬胃病水穀氣內蒸暑濕氣外侮內外相薄痹而不通當思苦辛寒以宣之宗河間法飛滑石生石膏寒水石杏仁木防己萆薢晚蠶砂一兩煎湯濾清煎夏秋內伏暑濕皆是陰邪久瘡漸致食入痞滿形寒脈小當溫中醒陽莫以清涼治瘡米仁生白朮薄肉桂茯苓五加皮豬苓患處熱蒸痛癢是經脈氣血不行但癰疽之餘毒輕為瘡痍重延流注清解固宜然胃弱少餐苦寒宜慎且瘍發身坐以上氣分之郁必究金銀花川貝母白蒺藜夏枯草地骨皮香附汁瘡家營衛自虛寒熱神疲調補二氣非廖久虛不復不待恃藥當以靜養身心為要黃耆當歸身制首烏茯苓桂枝皮枸杞子飴糖漿為丸耳聤環口浮腫是少陽陽明風熱久而失解邪漫經絡顯然疹現隨沒當與羅謙甫既濟解毒枯芩升麻荊芥銀花大黃黃連葛根防風甘草酒浸半日陰乾煎風毒濕鬱為六氣所傷醫治經年必損氣血為內傷症白蒺藜雞子制枸杞子
